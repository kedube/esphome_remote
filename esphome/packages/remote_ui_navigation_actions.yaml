                  - script.execute:
                      id: set_setting_preview
                      text: "TURNING OFF"
                else:
                  - script.execute:
                      id: set_setting_preview
                      text: "ALREADY OFF"
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_FANS;'
          then:
            - if:
                condition:
                  lambda: 'return id(selected_item_state) == "on";'
                then:
                  - script.execute: toggle_selected_fan
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_COVERS;'
          then:
            - script.execute: close_selected_cover
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_LOCKS;'
          then:
            - script.execute: unlock_selected_lock
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_MEDIA;'
          then:
            - script.execute: media_play_stop
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_WATER_HEATERS;'
          then:
            - if:
                condition:
                  lambda: 'return id(selected_item_state) != "off";'
                then:
                  - script.execute: water_heater_turn_off_selected
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_ALARMS;'
          then:
            - script.execute: disarm_selected_alarm

  - id: execute_circle_button_action
    then:
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_LIGHTS;'
          then:
            - homeassistant.service:
                service: light.turn_on
                data:
                  entity_id: !lambda 'return id(selected_item_entity);'
                  brightness_pct: !lambda 'return id(selected_brightness_pct) > 0 ? id(selected_brightness_pct) : 100;'
            - lambda: |-
                id(selected_item_state) = "on";
                if (id(selected_brightness_pct) <= 0) id(selected_brightness_pct) = 100;
                id(updated_ui) = true;
            - script.execute: update_display
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_SWITCHES;'
          then:
            - script.execute: turn_on_selected_switch
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_CLIMATE;'
          then:
            - if:
                condition:
                  lambda: 'return id(selected_item_state) == "off";'
                then:
                  - script.execute: toggle_selected_climate_power
                  - script.execute:
                      id: set_setting_preview
                      text: "TURNING ON"
                else:
                  - script.execute:
                      id: set_setting_preview
                      text: "ALREADY ON"
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_HUMIDIFIERS;'
          then:
            - if:
                condition:
                  lambda: 'return id(selected_item_state) == "off";'
                then:
                  - script.execute: toggle_selected_humidifier_power
                  - script.execute:
                      id: set_setting_preview
                      text: "TURNING ON"
                else:
                  - script.execute:
                      id: set_setting_preview
                      text: "ALREADY ON"
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_FANS;'
          then:
            - if:
                condition:
                  lambda: 'return id(selected_item_state) != "on";'
                then:
