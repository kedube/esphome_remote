            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_WEATHER_CONDITIONS;'
          then:
            - lambda: |-
                int next = id(selected_weather_detail_index) + (step > 0 ? 1 : -1);
                if (next < 0) next = 10;
                if (next > 10) next = 0;
                id(selected_weather_detail_index) = next;
                id(last_setting_interaction) = millis();
                id(updated_ui) = true;
            - script.execute: update_display

  - id: execute_square_button_action
