                    ? next_water_heater_operation_mode_for_index(id(selected_water_heater_index))
                    : previous_water_heater_operation_mode_for_index(id(selected_water_heater_index));
                if (next_mode.empty()) {
                  return;
                }
                id(set_water_heater_operation_mode).execute(next_mode);
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_WATER_HEATER_AWAY;'
          then:
