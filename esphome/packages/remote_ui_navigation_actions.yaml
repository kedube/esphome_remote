      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_MEDIA;'
          then:
            - script.execute: media_play_pause
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_WATER_HEATERS;'
          then:
            - if:
                condition:
                  lambda: 'return id(selected_item_state) == "off";'
                then:
                  - script.execute: water_heater_turn_on_selected
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_AUTOMATION;'
          then:
