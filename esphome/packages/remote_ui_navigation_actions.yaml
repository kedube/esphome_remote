      - if:
          condition:
            lambda: 'return id(last_mode_action_command) == REMOTE_UI_ACTION_TOGGLE_HUMIDIFIER_POWER;'
          then:
            - script.execute: toggle_selected_humidifier_power
      - if:
          condition:
            lambda: 'return id(last_mode_action_command) == REMOTE_UI_ACTION_CYCLE_HUMIDIFIER_MODE;'
          then:
            - script.execute: cycle_selected_humidifier_mode
      - if:
          condition:
            lambda: 'return id(last_mode_action_command) == REMOTE_UI_ACTION_TURN_ON_SWITCH;'
          then:
            - script.execute: turn_on_selected_switch
      - if:
          condition:
            lambda: 'return id(last_mode_action_command) == REMOTE_UI_ACTION_TURN_OFF_SWITCH;'
          then:
            - script.execute: turn_off_selected_switch
      - if:
          condition:
            lambda: 'return id(last_mode_action_command) == REMOTE_UI_ACTION_MEDIA_PLAY_PAUSE;'
          then:
