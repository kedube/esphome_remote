      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_CLIMATE;'
          then:
            - if:
                condition:
                  lambda: 'return id(selected_item_state) != "off";'
                then:
                  - script.execute: toggle_selected_climate_power
