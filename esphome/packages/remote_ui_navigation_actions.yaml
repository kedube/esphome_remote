script:
  - id: cycle_mode
    mode: restart
    then:
      - lambda: |-
          id(last_navigation_requested_at) = millis();
          id(current_menu_index) = next_available_menu_index(id(current_menu_index), 1);
          id(selected_setting_option) = REMOTE_SETTING_NONE;
          id(selected_setting_detail).clear();
          id(last_setting_interaction) = 0;
          id(updated_ui) = true;
      - script.execute: reset_mode_feedback_timers
      - script.execute: update_selected_item

  - id: set_setting_preview
    parameters:
      text: std::string
    then:
      - lambda: |-
          id(selected_setting_detail) = text;
          id(last_setting_interaction) = millis();
          id(updated_ui) = true;
      - script.execute: update_display

  - id: cycle_setting_option
    parameters:
      step: int
    then:
      - lambda: |-
          RemoteMode mode = static_cast<RemoteMode>(id(current_mode));
          std::array<int, 8> options{};
          int count = 0;
          auto add_option = [&](RemoteSettingOption option) {
            options[count++] = static_cast<int>(option);
          };

          switch (mode) {
            case REMOTE_MODE_LIGHTS:
              if (selected_light_has_brightness(id(selected_light_index))) add_option(REMOTE_SETTING_LIGHT_DIMMER);
              if (selected_light_has_effect(id(selected_light_index))) add_option(REMOTE_SETTING_LIGHT_EFFECT);
              break;
            case REMOTE_MODE_CLIMATE:
              if (!isnan(id(selected_climate_target_temp_low))) add_option(REMOTE_SETTING_CLIMATE_LOW);
              if (!isnan(id(selected_climate_target_temp_high))) add_option(REMOTE_SETTING_CLIMATE_HIGH);
              if (!isnan(id(selected_climate_target_temp)) && isnan(id(selected_climate_target_temp_low)) && isnan(id(selected_climate_target_temp_high))) add_option(REMOTE_SETTING_CLIMATE_TARGET);
              if (!selected_climate_fan_modes(id(selected_climate_index)).empty()) add_option(REMOTE_SETTING_CLIMATE_FAN);
              if (!isnan(id(selected_climate_target_humidity))) add_option(REMOTE_SETTING_CLIMATE_HUMIDITY);
              if (climate_supports_preset(id(selected_climate_index))) add_option(REMOTE_SETTING_CLIMATE_PRESETS);
              if (!id(selected_climate_hvac_action).empty() && id(selected_climate_hvac_action) != "unknown") add_option(REMOTE_SETTING_CLIMATE_ACTION);
              add_option(REMOTE_SETTING_CLIMATE_STATE);
              break;
            case REMOTE_MODE_HUMIDIFIERS:
              if (!isnan(id(selected_humidifier_target_humidity))) add_option(REMOTE_SETTING_HUMIDIFIER_HUMIDITY);
              if (!humidifier_available_modes_for_index(id(selected_humidifier_index)).empty()) add_option(REMOTE_SETTING_HUMIDIFIER_MODE);
              if (!id(selected_humidifier_action).empty() && id(selected_humidifier_action) != "unknown") add_option(REMOTE_SETTING_HUMIDIFIER_ACTION);
              add_option(REMOTE_SETTING_HUMIDIFIER_STATE);
              break;
            case REMOTE_MODE_FANS:
              if (selected_fan_has_percentage(id(selected_fan_index))) add_option(REMOTE_SETTING_FAN_SPEED);
              if (!fan_preset_modes_for_index(id(selected_fan_index)).empty()) add_option(REMOTE_SETTING_FAN_PRESETS);
              if (!fan_oscillating_for_index(id(selected_fan_index)).empty()) add_option(REMOTE_SETTING_FAN_OSCILLATE);
              if (!fan_direction_for_index(id(selected_fan_index)).empty()) add_option(REMOTE_SETTING_FAN_DIRECTION);
              break;
            case REMOTE_MODE_COVERS:
              if (selected_cover_has_position(id(selected_cover_index))) add_option(REMOTE_SETTING_COVER_POSITION);
              if (selected_cover_has_tilt(id(selected_cover_index))) add_option(REMOTE_SETTING_COVER_TILT);
              break;
            case REMOTE_MODE_MEDIA:
              add_option(REMOTE_SETTING_MEDIA_SELECT);
              add_option(REMOTE_SETTING_MEDIA_VOLUME);
              if (!id(selected_media_shuffle).empty()) add_option(REMOTE_SETTING_MEDIA_SHUFFLE);
              if (id(selected_media_device_class) == "tv") add_option(REMOTE_SETTING_MEDIA_CHANNEL);
              if (media_source_option_count(id(selected_media_index)) > 0) add_option(REMOTE_SETTING_MEDIA_SOURCE);
              if (!id(selected_media_repeat).empty()) add_option(REMOTE_SETTING_MEDIA_REPEAT);
              if (!selected_media_sound_mode_list(id(selected_media_index)).empty()) add_option(REMOTE_SETTING_MEDIA_SOUND);
              add_option(REMOTE_SETTING_MEDIA_STATE);
              break;
            case REMOTE_MODE_ALARMS:
              add_option(REMOTE_SETTING_ALARM_STATE);
              break;
            case REMOTE_MODE_NOTIFICATIONS:
              add_option(REMOTE_SETTING_NOTIFICATION_MESSAGES);
              break;
            case REMOTE_MODE_WEATHER:
              add_option(REMOTE_SETTING_WEATHER_CONDITIONS);
              if (!isnan(id(selected_weather_humidity))) add_option(REMOTE_SETTING_WEATHER_HUMIDITY);
              if (!isnan(id(selected_weather_wind_speed))) add_option(REMOTE_SETTING_WEATHER_WIND_SPEED);
              if (!isnan(id(selected_weather_wind_bearing))) add_option(REMOTE_SETTING_WEATHER_WIND_BEARING);
              if (!isnan(id(selected_weather_wind_gust_speed))) add_option(REMOTE_SETTING_WEATHER_WIND_GUST);
              if (!isnan(id(selected_weather_pressure))) add_option(REMOTE_SETTING_WEATHER_PRESSURE);
              if (!isnan(id(selected_weather_precipitation))) add_option(REMOTE_SETTING_WEATHER_PRECIPITATION);
              if (!isnan(id(selected_weather_cloud_coverage))) add_option(REMOTE_SETTING_WEATHER_CLOUD_COVERAGE);
              if (!isnan(id(selected_weather_uv_index))) add_option(REMOTE_SETTING_WEATHER_UV_INDEX);
              if (!isnan(id(selected_weather_dew_point))) add_option(REMOTE_SETTING_WEATHER_DEW_POINT);
              if (!isnan(id(selected_weather_apparent_temperature))) add_option(REMOTE_SETTING_WEATHER_APPARENT_TEMP);
              if (!isnan(id(selected_weather_high_temp))) add_option(REMOTE_SETTING_WEATHER_HIGH_TEMP);
              if (!isnan(id(selected_weather_low_temp))) add_option(REMOTE_SETTING_WEATHER_LOW_TEMP);
              break;
            case REMOTE_MODE_WATER_HEATERS:
              if (!isnan(id(selected_water_heater_target_temp))) add_option(REMOTE_SETTING_WATER_HEATER_TARGET);
              if (!selected_water_heater_operation_list(id(selected_water_heater_index)).empty()) add_option(REMOTE_SETTING_WATER_HEATER_MODE);
              if (!id(selected_water_heater_away).empty()) add_option(REMOTE_SETTING_WATER_HEATER_AWAY);
              break;
            case REMOTE_MODE_SWITCHES:
            case REMOTE_MODE_LOCKS:
            case REMOTE_MODE_SENSORS:
            case REMOTE_MODE_AUTOMATION:
            case REMOTE_MODE_INFO:
            default:
              break;
          }

          if (count <= 0) {
            id(selected_setting_option) = REMOTE_SETTING_NONE;
            id(selected_setting_detail).clear();
            id(last_setting_interaction) = 0;
            id(updated_ui) = true;
            return;
          }

          int current = id(selected_setting_option);
          int next_idx = 0;
          bool found = false;
          for (int i = 0; i < count; i++) {
            if (options[i] == current) {
              next_idx = (i + step + count) % count;
              found = true;
              break;
            }
          }
          if (!found) {
            next_idx = step >= 0 ? 0 : count - 1;
          }
          id(selected_setting_option) = options[next_idx];
          RemoteSettingOption chosen = static_cast<RemoteSettingOption>(id(selected_setting_option));
          char buf[32];
          std::string detail;
          switch (chosen) {
            case REMOTE_SETTING_LIGHT_DIMMER:
              snprintf(buf, sizeof(buf), "%d%%", id(selected_brightness_pct));
              detail = buf;
              break;
            case REMOTE_SETTING_LIGHT_EFFECT:
              detail = selected_light_effect(id(selected_light_index));
              break;
            case REMOTE_SETTING_CLIMATE_LOW:
              if (!isnan(id(selected_climate_target_temp_low))) {
                snprintf(buf, sizeof(buf), "TARGET: %.0f°%s", id(selected_climate_target_temp_low), "${TEMPERATURE_UNIT}");
                detail = buf;
              }
              break;
            case REMOTE_SETTING_CLIMATE_HIGH:
              if (!isnan(id(selected_climate_target_temp_high))) {
                snprintf(buf, sizeof(buf), "TARGET: %.0f°%s", id(selected_climate_target_temp_high), "${TEMPERATURE_UNIT}");
                detail = buf;
              }
              break;
            case REMOTE_SETTING_CLIMATE_TARGET:
              if (!isnan(id(selected_climate_target_temp))) {
                snprintf(buf, sizeof(buf), "TARGET: %.0f°%s", id(selected_climate_target_temp), "${TEMPERATURE_UNIT}");
                detail = buf;
              }
              break;
            case REMOTE_SETTING_CLIMATE_FAN:
              detail = esphome::str_upper_case(id(selected_climate_fan_mode));
              break;
            case REMOTE_SETTING_CLIMATE_HUMIDITY:
              if (!isnan(id(selected_climate_target_humidity))) {
                snprintf(buf, sizeof(buf), "TARGET: %.0f%%", id(selected_climate_target_humidity));
                detail = buf;
              }
              break;
            case REMOTE_SETTING_CLIMATE_PRESETS:
              detail = id(selected_climate_preset);
              break;
            case REMOTE_SETTING_CLIMATE_ACTION:
              detail = esphome::str_upper_case(id(selected_climate_hvac_action));
              break;
            case REMOTE_SETTING_CLIMATE_STATE:
              detail = esphome::str_upper_case(id(selected_item_state));
              break;
            case REMOTE_SETTING_HUMIDIFIER_HUMIDITY:
              if (!isnan(id(selected_humidifier_target_humidity))) {
                snprintf(buf, sizeof(buf), "TARGET: %.0f%%", id(selected_humidifier_target_humidity));
                detail = buf;
              }
              break;
            case REMOTE_SETTING_HUMIDIFIER_MODE:
              detail = esphome::str_upper_case(id(selected_humidifier_mode));
              break;
            case REMOTE_SETTING_HUMIDIFIER_ACTION:
              detail = id(selected_humidifier_action);
              break;
            case REMOTE_SETTING_HUMIDIFIER_STATE:
              detail = esphome::str_upper_case(id(selected_item_state));
              break;
            case REMOTE_SETTING_FAN_SPEED:
              snprintf(buf, sizeof(buf), "%d%%", id(selected_fan_speed_pct));
              detail = buf;
              break;
            case REMOTE_SETTING_FAN_PRESETS:
              detail = fan_preset_mode_for_index(id(selected_fan_index));
              break;
            case REMOTE_SETTING_FAN_OSCILLATE: {
              const std::string &osc = fan_oscillating_for_index(id(selected_fan_index));
              detail = (osc == "true" || osc == "True" || osc == "on") ? "ON" : "OFF";
              break;
            }
            case REMOTE_SETTING_FAN_DIRECTION:
              detail = fan_direction_for_index(id(selected_fan_index));
              break;
            case REMOTE_SETTING_COVER_POSITION:
              if (id(selected_cover_position_pct) > 0) {
                snprintf(buf, sizeof(buf), "%d%%", id(selected_cover_position_pct));
                detail = buf;
              }
              break;
            case REMOTE_SETTING_COVER_TILT: {
              float tilt = selected_cover_tilt(id(selected_cover_index));
              if (!isnan(tilt)) {
                snprintf(buf, sizeof(buf), "TILT %d%%", int(tilt));
                detail = buf;
              }
              break;
            }
            case REMOTE_SETTING_MEDIA_SELECT:
            case REMOTE_SETTING_MEDIA_CHANNEL:
              detail = id(selected_media_artist);
              break;
            case REMOTE_SETTING_MEDIA_VOLUME:
              snprintf(buf, sizeof(buf), "%d%%", id(selected_media_volume_pct));
              detail = buf;
              break;
            case REMOTE_SETTING_MEDIA_SHUFFLE: {
              const std::string &sh = id(selected_media_shuffle);
              detail = (sh == "on" || sh == "true" || sh == "True") ? "ON" : "OFF";
              break;
            }
            case REMOTE_SETTING_MEDIA_SOURCE:
              detail = id(selected_media_source);
              break;
            case REMOTE_SETTING_MEDIA_REPEAT:
              detail = esphome::str_upper_case(id(selected_media_repeat));
              break;
            case REMOTE_SETTING_MEDIA_SOUND:
              detail = id(selected_media_sound_mode);
              break;
            case REMOTE_SETTING_MEDIA_STATE:
              detail = esphome::str_upper_case(id(selected_item_state));
              break;
            case REMOTE_SETTING_ALARM_STATE:
              detail = std::string(alarm_arm_mode_selection_label(clamp_alarm_arm_mode(id(selected_alarm_arm_mode))));
              break;
            case REMOTE_SETTING_WATER_HEATER_TARGET:
              if (!isnan(id(selected_water_heater_target_temp))) {
                snprintf(buf, sizeof(buf), "TARGET %.0f°${TEMPERATURE_UNIT}", id(selected_water_heater_target_temp));
                detail = buf;
              }
              break;
            case REMOTE_SETTING_WATER_HEATER_MODE:
              detail = id(selected_water_heater_mode);
              break;
            case REMOTE_SETTING_WATER_HEATER_AWAY: {
              const std::string &away = id(selected_water_heater_away);
              detail = (away == "on" || away == "true" || away == "True") ? "AWAY ON" : "AWAY OFF";
              break;
            }
            case REMOTE_SETTING_WEATHER_HUMIDITY:
              if (!isnan(id(selected_weather_humidity))) {
                snprintf(buf, sizeof(buf), "%.0f%%", id(selected_weather_humidity));
                detail = buf;
              }
              break;
            case REMOTE_SETTING_WEATHER_WIND_SPEED:
              if (!isnan(id(selected_weather_wind_speed))) {
                snprintf(buf, sizeof(buf), "%.0f ${SPEED_UNIT}", id(selected_weather_wind_speed));
                detail = buf;
              }
              break;
            case REMOTE_SETTING_WEATHER_WIND_BEARING:
              if (!isnan(id(selected_weather_wind_bearing))) {
                snprintf(buf, sizeof(buf), "%.0f°", id(selected_weather_wind_bearing));
                detail = buf;
              }
              break;
            case REMOTE_SETTING_WEATHER_WIND_GUST:
              if (!isnan(id(selected_weather_wind_gust_speed))) {
                snprintf(buf, sizeof(buf), "%.0f ${SPEED_UNIT}", id(selected_weather_wind_gust_speed));
                detail = buf;
              }
              break;
            case REMOTE_SETTING_WEATHER_PRESSURE:
              if (!isnan(id(selected_weather_pressure))) {
                snprintf(buf, sizeof(buf), "%.0f ${PRESSURE_UNIT}", id(selected_weather_pressure));
                detail = buf;
              }
              break;
            case REMOTE_SETTING_WEATHER_PRECIPITATION:
              if (!isnan(id(selected_weather_precipitation))) {
                snprintf(buf, sizeof(buf), "%.1f ${PRECIPITATION_UNIT}", id(selected_weather_precipitation));
                detail = buf;
              }
              break;
            case REMOTE_SETTING_WEATHER_CLOUD_COVERAGE:
              if (!isnan(id(selected_weather_cloud_coverage))) {
                snprintf(buf, sizeof(buf), "%.0f%%", id(selected_weather_cloud_coverage));
                detail = buf;
              }
              break;
            case REMOTE_SETTING_WEATHER_UV_INDEX:
              if (!isnan(id(selected_weather_uv_index))) {
                snprintf(buf, sizeof(buf), "%.1f", id(selected_weather_uv_index));
                detail = buf;
              }
              break;
            case REMOTE_SETTING_WEATHER_DEW_POINT:
              if (!isnan(id(selected_weather_dew_point))) {
                snprintf(buf, sizeof(buf), "%.0f°%s", id(selected_weather_dew_point), "${TEMPERATURE_UNIT}");
                detail = buf;
              }
              break;
            case REMOTE_SETTING_WEATHER_APPARENT_TEMP:
              if (!isnan(id(selected_weather_apparent_temperature))) {
                snprintf(buf, sizeof(buf), "%.0f°%s", id(selected_weather_apparent_temperature), "${TEMPERATURE_UNIT}");
                detail = buf;
              }
              break;
            case REMOTE_SETTING_WEATHER_HIGH_TEMP:
              if (!isnan(id(selected_weather_high_temp))) {
                snprintf(buf, sizeof(buf), "%.0f°%s", id(selected_weather_high_temp), "${TEMPERATURE_UNIT}");
                detail = buf;
              }
              break;
            case REMOTE_SETTING_WEATHER_LOW_TEMP:
              if (!isnan(id(selected_weather_low_temp))) {
                snprintf(buf, sizeof(buf), "%.0f°%s", id(selected_weather_low_temp), "${TEMPERATURE_UNIT}");
                detail = buf;
              }
              break;
            default:
              break;
          }
          id(selected_setting_detail) = detail;
          id(last_setting_interaction) = millis();
          id(updated_ui) = true;
      - script.execute: update_display

  - id: adjust_selected_setting
    parameters:
      step: int
    then:
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_LIGHT_DIMMER;'
          then:
            - if:
                condition:
                  lambda: 'return step > 0;'
                then:
                  - script.execute: increase_brightness
                else:
                  - script.execute: decrease_brightness
            - script.execute:
                id: set_setting_preview
                text: !lambda |-
                  char buffer[24];
                  snprintf(buffer, sizeof(buffer), "%d%%", id(selected_brightness_pct));
                  return std::string(buffer);
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_LIGHT_EFFECT;'
          then:
            - script.execute:
                id: adjust_light_effect
                step: !lambda 'return step > 0 ? 1 : -1;'
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_CLIMATE_LOW;'
          then:
            - if:
                condition:
                  lambda: 'return step > 0;'
                then:
                  - script.execute: climate_temperature_up
                else:
                  - script.execute: climate_temperature_down
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_CLIMATE_TARGET;'
          then:
            - if:
                condition:
                  lambda: 'return step > 0;'
                then:
                  - script.execute: climate_temperature_up
                else:
                  - script.execute: climate_temperature_down
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_CLIMATE_HIGH;'
          then:
            - if:
                condition:
                  lambda: 'return step > 0;'
                then:
                  - script.execute: climate_temperature_high_up
                else:
                  - script.execute: climate_temperature_high_down
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_CLIMATE_FAN;'
          then:
            - lambda: |-
                std::string next_mode = step > 0
                    ? next_climate_fan_mode_for_index(id(selected_climate_index))
                    : previous_climate_fan_mode_for_index(id(selected_climate_index));
                if (next_mode.empty()) {
                  return;
                }
                id(set_selected_climate_fan_mode).execute(next_mode);
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_CLIMATE_HUMIDITY;'
          then:
            - script.execute:
                id: adjust_selected_climate_humidity
                delta: !lambda 'return step > 0 ? 1.0f : -1.0f;'
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_CLIMATE_PRESETS;'
          then:
            - script.execute:
                id: cycle_selected_climate_preset_step
                step: !lambda 'return step > 0 ? 1 : -1;'
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_HUMIDIFIER_HUMIDITY;'
          then:
            - if:
                condition:
                  lambda: 'return step > 0;'
                then:
                  - script.execute: humidifier_target_up
                else:
                  - script.execute: humidifier_target_down
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_HUMIDIFIER_MODE;'
          then:
            - script.execute:
                id: cycle_selected_humidifier_mode_step
                step: !lambda 'return step > 0 ? 1 : -1;'
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_FAN_SPEED;'
          then:
            - if:
                condition:
                  lambda: 'return step > 0;'
                then:
                  - script.execute: increase_fan_speed
                else:
                  - script.execute: decrease_fan_speed
            - script.execute:
                id: set_setting_preview
                text: !lambda |-
                  char buffer[24];
                  snprintf(buffer, sizeof(buffer), "%d%%", id(selected_fan_speed_pct));
                  return std::string(buffer);
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_FAN_PRESETS;'
          then:
            - script.execute:
                id: adjust_fan_preset
                step: !lambda 'return step > 0 ? 1 : -1;'
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_FAN_OSCILLATE;'
          then:
            - script.execute:
                id: set_fan_oscillation
                enabled: !lambda 'return step > 0;'
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_FAN_DIRECTION;'
          then:
            - script.execute:
                id: set_fan_direction_value
                direction: !lambda 'return step > 0 ? std::string("forward") : std::string("reverse");'
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_COVER_POSITION;'
          then:
            - if:
                condition:
                  lambda: 'return step > 0;'
                then:
                  - script.execute: increase_cover_position
                else:
                  - script.execute: decrease_cover_position
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_COVER_TILT;'
          then:
            - if:
                condition:
                  lambda: 'return step > 0;'
                then:
                  - script.execute: increase_cover_tilt
                else:
                  - script.execute: decrease_cover_tilt
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_MEDIA_SELECT || id(selected_setting_option) == REMOTE_SETTING_MEDIA_CHANNEL;'
          then:
            - if:
                condition:
                  lambda: 'return step > 0;'
                then:
                  - script.execute: media_next_track
                else:
                  - script.execute: media_previous_track
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_MEDIA_VOLUME;'
          then:
            - if:
                condition:
                  lambda: 'return step > 0;'
                then:
                  - script.execute: media_volume_up
                else:
                  - script.execute: media_volume_down
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_MEDIA_SHUFFLE;'
          then:
            - script.execute:
                id: media_set_shuffle
                enabled: !lambda 'return step > 0;'
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_MEDIA_SOURCE;'
          then:
            - lambda: |-
                std::string next_source = step > 0
                    ? next_media_source_for_index(id(selected_media_index), id(selected_media_source))
                    : previous_media_source_for_index(id(selected_media_index), id(selected_media_source));
                if (next_source.empty()) {
                  return;
                }
                id(selected_media_source) = next_source;
                set_media_source_for_index(id(selected_media_index), next_source);
                id(last_media_source_interaction) = millis();
                id(last_setting_interaction) = millis();
                id(selected_setting_detail) = next_source;
                id(updated_ui) = true;
            - homeassistant.service:
                service: media_player.select_source
                data:
                  entity_id: !lambda 'return id(selected_item_entity);'
                  source: !lambda 'return id(selected_media_source);'
            - script.execute: update_display
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_MEDIA_REPEAT;'
          then:
            - script.execute:
                id: cycle_selected_media_repeat
                step: !lambda 'return step > 0 ? 1 : -1;'
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_MEDIA_SOUND;'
          then:
            - script.execute:
                id: cycle_selected_media_sound_mode
                step: !lambda 'return step > 0 ? 1 : -1;'
      - if:
          condition:
            lambda: 'return id(selected_setting_option) == REMOTE_SETTING_ALARM_STATE;'
          then:
            - script.execute:
                id: shift_selected_alarm_arm_mode
                step: !lambda 'return step > 0 ? 1 : -1;'
      - if:
          condition:
