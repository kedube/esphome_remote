substitutions:
    PIN_BAT_ADC: "36"
    PIN_BTN_DIMMER: "32"
    PIN_BTN_CIRCLE: "5"

esphome:
  on_boot:
    - priority: 400
      then:
        - script.execute: update_battery

sensor:
  - platform: adc
    pin: ${PIN_BAT_ADC}
    id: battery_adc
    attenuation: 12db
    update_interval: never
    filters:
      - multiply: ${BATTERY_DIVIDER_MULTIPLIER}

  - platform: template
    id: battery_voltage_sensor
    name: "Battery Voltage"
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    update_interval: never
    lambda: |-
      if (!id(battery_adc).has_state()) {
        return NAN;
      }
      return id(battery_adc).state;

  - platform: template
    id: battery_percent_sensor
    name: "Battery"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    state_class: measurement
    update_interval: never
    lambda: |-
      if (!id(battery_adc).has_state()) {
        return NAN;
      }

      float v = id(battery_adc).state;
      static float v_avg = 0;

      const float V_MIN = ${BATTERY_VOLTAGE_MIN};
      const float V_MAX = ${BATTERY_VOLTAGE_MAX};
      const float GAMMA = ${BATTERY_VOLTAGE_CURVE_GAMMA};

      if (isnan(v) || v < 2.5 || v > 4.5) {
        return NAN;
      }

      v_avg = (v_avg == 0) ? v : (v_avg * 0.8f + v * 0.2f);
      v = v_avg;

      if (v <= V_MIN) return 0;
      if (v >= V_MAX) return 100;

      float x = (v - V_MIN) / (V_MAX - V_MIN);
      float pct = powf(x, GAMMA) * 100.0f;

      return (int)roundf(pct);

script:
  - id: turn_off
    mode: single
    then:
      - script.execute: persist_ui_state_and_sync
      - script.execute: show_powering_off_screen
      - delay: 1s
      - script.execute: clear_display_for_sleep
      - delay: 500ms
      - deep_sleep.enter: go_sleep

  - id: update_battery
    mode: single
    then:
      - logger.log:
          level: DEBUG
          format: "Updating battery state"
      - component.update: battery_adc
      - delay: 50ms
      - lambda: |-
          ESP_LOGD("battery", "ADC has state: %d value: %.3f",
            id(battery_adc).has_state(),
            id(battery_adc).has_state() ? id(battery_adc).state : -1.0);
      - component.update: battery_voltage_sensor
      - component.update: battery_percent_sensor
      - lambda: |-
          bool voltage_valid = id(battery_voltage_sensor).has_state() && !isnan(id(battery_voltage_sensor).state);
          bool percentage_valid = id(battery_percent_sensor).has_state() && !isnan(id(battery_percent_sensor).state);

          id(battery_monitoring_available) = voltage_valid && percentage_valid;
          id(battery_voltage) = voltage_valid ? id(battery_voltage_sensor).state : NAN;
          id(battery_percentage) = percentage_valid ? int(roundf(id(battery_percent_sensor).state)) : 0;
          id(last_battery_update) = millis();
          id(updated_ui) = true;

interval:
  - interval: 5min
    then:
      - script.execute: update_battery
