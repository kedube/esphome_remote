# Shared display and UI state definitions.
display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    rotation: 180
    contrast: 0.5
    id: oled_display

globals:
  - id: contrast
    type: int
    initial_value: '5'

  - id: last_active
    type: int
    restore_value: no
    initial_value: '0'

  - id: last_brightness_interaction
    type: uint32_t
    initial_value: '0'

