# Background runtime timers and periodic refresh behavior.
interval:
  - interval: 500ms
    then:
      - if:
          condition:
            lambda: |-
              if (id(wake_button_press_started_at) != 0) {
                return false;
              }
              return (millis() / 1000) - id(last_active) >= ${SLEEP_DURATION};
          then:
            - script.execute: turn_off
          else:
            - lambda: |-
                RemoteUiTimeoutState state;
                state.last_brightness_interaction = id(last_brightness_interaction);
                state.last_switch_interaction = id(last_switch_interaction);
                state.last_contrast_interaction = id(last_contrast_interaction);
                state.last_setting_interaction = id(last_setting_interaction);
                state.last_climate_interaction = id(last_climate_interaction);
                state.last_fan_speed_interaction = id(last_fan_speed_interaction);
                state.last_humidifier_interaction = id(last_humidifier_interaction);
                state.last_humidifier_mode_interaction = id(last_humidifier_mode_interaction);
                state.last_lock_interaction = id(last_lock_interaction);
                state.last_cover_interaction = id(last_cover_interaction);
                state.last_cover_position_interaction = id(last_cover_position_interaction);
                state.last_climate_target_focus_interaction = id(last_climate_target_focus_interaction);
                state.last_media_volume_interaction = id(last_media_volume_interaction);
                state.last_media_source_interaction = id(last_media_source_interaction);
                state.last_media_power_interaction = id(last_media_power_interaction);
                state.last_automation_interaction = id(last_automation_interaction);
                state.last_alarm_interaction = id(last_alarm_interaction);
                state.climate_target_focus = id(climate_target_focus);
                state.climate_target_focus_value = id(climate_target_focus_value);
                state.selected_setting_detail = &id(selected_setting_detail);
                state.preserve_selected_setting_detail =
                  id(selected_setting_option) == static_cast<int>(REMOTE_SETTING_ALARM_STATE);
                state.updated_ui = id(updated_ui);
                apply_remote_ui_timeout_updates(millis(), state);
                id(climate_target_focus) = state.climate_target_focus;
                id(climate_target_focus_value) = state.climate_target_focus_value;
                id(last_setting_interaction) = state.last_setting_interaction;
                id(last_climate_target_focus_interaction) = state.last_climate_target_focus_interaction;
                id(updated_ui) = state.updated_ui;
            - if:
                condition:
                  lambda: |-
                    if (id(wake_button_press_started_at) == 0 || id(wake_button_long_press_fired)) {
                      return false;
                    }
                    if (!id(wake_button).state) {
                      return false;
                    }
                    return (millis() - id(wake_button_press_started_at)) >= 8000;
                then:
                  - lambda: |-
                      id(wake_button_long_press_fired) = true;
                      id(wake_button_press_started_at) = 0;
                  - script.execute: reboot_device
            - if:
                condition:
                  wifi.connected:
                then:
                  - if:
                      condition:
                        api.connected:
                          state_subscription_only: true
                      then:
                        - if:
                            condition:
                              lambda: 'return id(show_boot_screen) && !id(low_battery_popup_active);'
                            then:
                              - if:
                                  condition:
                                    lambda: 'return id(battery_monitoring_available) && !id(low_battery_popup_shown) && !isnan(id(battery_voltage)) && id(battery_voltage) <= ${LOW_BATTERY_VOLTAGE};'
                                  then:
                                    - script.execute: show_low_battery_popup
                                  else:
                                    - lambda: |-
                                        id(show_boot_screen) = false;
                                        id(updated_ui) = true;
            - if:
                condition:
                  lambda: 'return id(low_battery_popup_active);'
                then:
                  - lambda: 'return;'
                else:
                  - if:
                      condition:
                        lambda: 'return id(show_boot_screen);'
                      then:
                        - script.execute: boot_screen
                      else:
                        - if:
                            condition:
                              not:
                                wifi.connected:
                            then:
                              - script.execute: wifi_disconnected_screen
                            else:
                              - if:
                                  condition:
                                    not:
                                      api.connected:
                                        state_subscription_only: true
                                  then:
                                    - script.execute: api_disconnected_screen
                                  else:
                                    - if:
                                        condition:
                                          lambda: |-
                                            uint32_t now = millis();
                                            return id(last_navigation_requested_at) == 0 ||
                                                   (now - id(last_navigation_requested_at)) >= 250;
                                        then:
                                          - script.execute: sync_current_mode_status
                                    - if:
                                        condition:
                                          lambda: |-
                                            return id(selected_setting_option) != static_cast<int>(REMOTE_SETTING_NONE) &&
                                                   id(last_setting_interaction) == 0 &&
                                                   id(selected_setting_detail).empty();
                                        then:
                                          - script.execute: sync_current_mode_status
                                    - if:
                                        condition:
                                          lambda: 'return id(updated_ui);'
                                        then:
                                          - script.execute: update_display
  - interval: 30min
    then:
      - lambda: |-
          request_all_weather_status();
