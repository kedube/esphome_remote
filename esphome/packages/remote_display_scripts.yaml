script:
  - id: update_display
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(updated_ui) == true;'
          then:
            - lambda: |-
                auto it = id(oled_display);
                RemoteMode mode = static_cast<RemoteMode>(id(current_mode));
                UiMenuHeader header = ui_menu_header(id(current_menu_index), mode);
                RemoteRenderContext ctx;
                ctx.mode = mode;
                ctx.mode_title_override = header.title;
                ctx.mode_icon_override = header.icon;
                ctx.now = millis();
                ctx.contrast = id(contrast);
                ctx.automation_index = id(selected_automation_index);
                ctx.info_index = id(selected_info_index);
                ctx.selected_setting_option = id(selected_setting_option);
                ctx.selected_weather_detail_index = id(selected_weather_detail_index);
                ctx.climate_target_focus = id(climate_target_focus);
                ctx.selected_brightness_pct = id(selected_brightness_pct);
                ctx.selected_fan_speed_pct = id(selected_fan_speed_pct);
                ctx.selected_cover_position_pct = id(selected_cover_position_pct);
                ctx.selected_media_volume_pct = id(selected_media_volume_pct);
                ctx.battery_percentage = id(battery_percentage);
                ctx.last_brightness_interaction = id(last_brightness_interaction);
                ctx.last_switch_interaction = id(last_switch_interaction);
                ctx.last_contrast_interaction = id(last_contrast_interaction);
                ctx.last_setting_interaction = id(last_setting_interaction);
                ctx.last_fan_speed_interaction = id(last_fan_speed_interaction);
                ctx.last_humidifier_interaction = id(last_humidifier_interaction);
                ctx.last_humidifier_mode_interaction = id(last_humidifier_mode_interaction);
                ctx.last_cover_interaction = id(last_cover_interaction);
                ctx.last_cover_position_interaction = id(last_cover_position_interaction);
                ctx.last_climate_target_focus_interaction = id(last_climate_target_focus_interaction);
                ctx.last_media_volume_interaction = id(last_media_volume_interaction);
                ctx.last_media_source_interaction = id(last_media_source_interaction);
                ctx.last_media_power_interaction = id(last_media_power_interaction);
                ctx.last_automation_interaction = id(last_automation_interaction);
                ctx.last_alarm_interaction = id(last_alarm_interaction);
                ctx.last_lock_interaction = id(last_lock_interaction);
                ctx.last_notification_dismiss_interaction = id(last_notification_dismiss_interaction);
                ctx.settings_button_press_started_at = id(settings_button_press_started_at);
                ctx.settings_button_press_mode = id(settings_button_press_mode);
                ctx.settings_button_long_press_fired = id(settings_button_long_press_fired);
                ctx.battery_monitoring_available = id(battery_monitoring_available);
                ctx.selected_humidifier_target_humidity = id(selected_humidifier_target_humidity);
                ctx.selected_humidifier_current_humidity = id(selected_humidifier_current_humidity);
                ctx.selected_climate_target_temp = id(selected_climate_target_temp);
                ctx.selected_water_heater_target_temp = id(selected_water_heater_target_temp);
                ctx.selected_climate_target_temp_low = id(selected_climate_target_temp_low);
                ctx.selected_climate_target_temp_high = id(selected_climate_target_temp_high);
                ctx.selected_climate_current_temp = id(selected_climate_current_temp);
                ctx.selected_climate_target_humidity = id(selected_climate_target_humidity);
                ctx.climate_target_focus_value = id(climate_target_focus_value);
                ctx.selected_weather_temperature = id(selected_weather_temperature);
                ctx.selected_weather_humidity = id(selected_weather_humidity);
                ctx.selected_weather_high_temp = id(selected_weather_high_temp);
                ctx.selected_weather_low_temp = id(selected_weather_low_temp);
                ctx.battery_voltage = id(battery_voltage);
                ctx.selected_item_name = &id(selected_item_name);
                ctx.selected_item_state = &id(selected_item_state);
                ctx.selected_humidifier_action = &id(selected_humidifier_action);
                ctx.selected_humidifier_mode = &id(selected_humidifier_mode);
                ctx.selected_climate_hvac_action = &id(selected_climate_hvac_action);
                ctx.selected_climate_fan_mode = &id(selected_climate_fan_mode);
                ctx.selected_climate_hvac_mode = &id(selected_climate_hvac_mode);
                ctx.selected_media_title = &id(selected_media_title);
                ctx.selected_media_artist = &id(selected_media_artist);
                ctx.selected_media_device_class = &id(selected_media_device_class);
                ctx.selected_media_source = &id(selected_media_source);
                ctx.selected_media_shuffle = &id(selected_media_shuffle);
                ctx.selected_media_repeat = &id(selected_media_repeat);
                ctx.selected_media_sound_mode = &id(selected_media_sound_mode);
                ctx.selected_water_heater_mode = &id(selected_water_heater_mode);
                ctx.selected_water_heater_away = &id(selected_water_heater_away);
                ctx.last_media_power_feedback = &id(last_media_power_feedback);
                ctx.last_automation_feedback = &id(last_automation_feedback);
                ctx.last_alarm_feedback = &id(last_alarm_feedback);
                ctx.last_switch_feedback = &id(last_switch_feedback);
                ctx.last_lock_feedback = &id(last_lock_feedback);
                ctx.last_cover_feedback = &id(last_cover_feedback);
                ctx.selected_weather_condition = &id(selected_weather_condition);
                ctx.selected_sensor_unit = &id(selected_sensor_unit);
                ctx.selected_setting_detail = &id(selected_setting_detail);
                ctx.temperature_unit = "${TEMPERATURE_UNIT}";
                auto current_time = id(homeassistant_time).now();
                if (current_time.is_valid()) {
                  ctx.weather_is_night = current_time.hour < 6 || current_time.hour >= 18;
                }

                if (mode == REMOTE_MODE_INFO) {
                  populate_remote_info_text(
                      ctx.info_index, current_time, "${VERSION}", ctx.battery_monitoring_available,
                      ctx.battery_percentage, ctx.battery_voltage, ctx.info_primary_text, ctx.info_secondary_text);
                }

                render_remote_ui(
                    it, id(tiny_font), id(small_font), id(medium_font), id(symbols), id(medium_symbols),
                    id(weather_symbols), ctx);
                it->display();
                id(updated_ui) = false;
