script:
  - id: primary_mode_action
    then:
      - script.execute:
          id: dispatch_mode_action
          action: 0

  - id: secondary_mode_action
    then:
      - script.execute:
          id: dispatch_mode_action
          action: 1

  - id: play_pause_mode_action
    then:
      - script.execute:
          id: dispatch_mode_action
          action: 2

  - id: increase_mode_value
    then:
      - script.execute:
          id: dispatch_mode_action
          action: 3

  - id: decrease_mode_value
    then:
      - script.execute:
          id: dispatch_mode_action
          action: 4

  - id: reset_idle_timer
    mode: restart
    then:
      - lambda: |-
          id(last_active) = millis() / 1000;
