substitutions:
  ALARM_CODE: !secret alarm_code
  PIN_WAKE: "0"
  PIN_I2C_SDA: "27"
  PIN_I2C_SCL: "25"
  PIN_BTN_NEXT: "33"
  PIN_BTN_PREV: "22"
  PIN_BTN_MODE: "14"
  PIN_BTN_SETTINGS: "26"
  PIN_BTN_SQUARE: "23"
  PIN_BTN_MINUS: "19"
  PIN_BTN_PLUS: "18"

packages:
  settings: !include settings.yaml
  remote_fonts: !include packages/remote_fonts.yaml
  remote_display_core: !include packages/remote_display_core.yaml
  remote_display_runtime_globals: !include packages/remote_display_runtime_globals.yaml
  remote_display_selection_globals: !include packages/remote_display_selection_globals.yaml
  remote_display_state_globals: !include packages/remote_display_state_globals.yaml
  remote_inputs: !include packages/remote_inputs.yaml
  remote_runtime: !include packages/remote_runtime.yaml
  remote_ui_setup_scripts: !include packages/remote_ui_setup_scripts.yaml
  remote_ui_selection_scripts: !include packages/remote_ui_selection_scripts.yaml
  remote_ui_navigation_actions: !include packages/remote_ui_navigation_actions.yaml
  remote_actions_feedback: !include packages/remote_actions_feedback.yaml
  remote_actions_devices: !include packages/remote_actions_devices.yaml
  remote_actions_security: !include packages/remote_actions_security.yaml
  remote_actions_climate_media: !include packages/remote_actions_climate_media.yaml
  remote_actions_automation: !include packages/remote_actions_automation.yaml
  remote_button_press_scripts: !include packages/remote_button_press_scripts.yaml
  remote_button_action_scripts: !include packages/remote_button_action_scripts.yaml
  remote_display_scripts: !include packages/remote_display_scripts.yaml

esphome:
  name: ${DEVICE_NAME}
  friendly_name: ${FRIENDLY_NAME}
  min_version: 2026.1.0
  name_add_mac_suffix: false
  platformio_options:
    build_flags:
      - -DREMOTE_FRAMEBUFFER_WEB_DEBUG=${FRAMEBUFFER_WEB_DEBUG}
      - -DREMOTE_NOTIFICATION_FEED_MAX_ITEMS=${NOTIFICATION_FEED_MAX_ITEMS}
      - -DREMOTE_MAX_PERSISTED_FAVORITE_LISTS=${MAX_PERSISTED_FAVORITE_LISTS}
  includes:
    - ../include/entity_helpers.h
    - ../include/entity_trackers.h
    - ../include/entity_helpers_common.h
    - ../include/remote_ui_bindings.h
    - ../include/remote_ui_feedback.h
    - ../include/remote_ui_input_logic.h
    - ../include/remote_ui_logic.h
    - ../include/ui_state_helpers.h
    - ../include/remote_ui_renderer.h
    - ../include/remote_ui_sync.h
    - ../include/remote_ui_runtime.h
    - ../include/entity_helpers_requests.h
    - ../include/framebuffer_web_debug.h
    - ../src/framebuffer_web_debug.cpp
    - ../src/remote_ui_feedback.cpp
    - ../src/remote_ui_input_logic.cpp
    - ../src/remote_ui_logic.cpp
    - ../src/remote_ui_renderer.cpp
    - ../src/remote_ui_sync.cpp
    - ../src/remote_ui_runtime.cpp
    - local_entities.h
  on_boot:
    - priority: 250
      then:
        - lambda: |-
            id(ignore_next_wake_button_cycle) =
                esp_sleep_get_wakeup_cause() == ESP_SLEEP_WAKEUP_EXT0 && gpio_get_level(GPIO_NUM_${PIN_WAKE}) == 0;
            ensure_light_status_tracker();
            id(last_active) = millis() / 1000;
            PersistedUIStateData restored = unpack_persisted_ui_state(id(persisted_ui_state), id(persisted_ui_state_aux));

            for (int i = 0; i < FAVORITE_LIST_COUNT_INT; i++) {
              favorite_selected_index_ref(i) = restored.favorite_indices[i];
            }
            id(selected_notification_index) = restored.selected_notification_index;
            id(selected_info_index) = restored.selected_info_index;

            if (restored.contrast >= 1 && restored.contrast <= 10) {
              id(contrast) = restored.contrast;
            } else {
              id(contrast) = 5;
            }
            id(oled_display).set_contrast(id(contrast) * 1.0f / 10.0f);

            id(current_menu_index) = clamp_menu_index(restored.current_menu_index);
            id(current_mode) = REMOTE_MODE_INFO;
            id(updated_ui) = true;
        - script.execute: update_selected_item
    - priority: -100
      then:
        - lambda: |-
            register_framebuffer_web_debug(id(oled_display));

preferences:
  flash_write_interval: 5s

esp32:
  board: ${BOARD}
  flash_size: 4MB
  framework:
    type: arduino
    advanced:
      minimum_chip_revision: "3.1"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 10dB
  fast_connect: true
  power_save_mode: LIGHT

api:
  homeassistant_states: true
  reboot_timeout: 0s
  encryption:
    key: !secret encryption_key

json:

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time_sync:
      then:
        - lambda: |-
            id(updated_ui) = true;
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - lambda: |-
              id(updated_ui) = true;

ota:
  - platform: esphome
    password: !secret ota_password

safe_mode:
  boot_is_good_after: ${SAFE_MODE_BOOT_IS_GOOD_AFTER}

logger:
  level: INFO # DEBUG
  baud_rate: 460800 # Disable logging over UART

deep_sleep:
  id: go_sleep
  wakeup_pin:
    number: ${PIN_WAKE}
    inverted: true
    allow_other_uses: true
    ignore_strapping_warning: true
  wakeup_pin_mode: KEEP_AWAKE

i2c:
  sda: ${PIN_I2C_SDA}
  scl: ${PIN_I2C_SCL}
  frequency: 400kHz
  scan: false
