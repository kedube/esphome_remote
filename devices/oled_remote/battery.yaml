substitutions:
    PIN_BAT_ADC: "32"

sensor:
  - platform: adc
    pin: ${PIN_BAT_ADC}
    id: battery_adc
    attenuation: 12db
    update_interval: never
    filters:
      - multiply: 1.68

  - platform: template
    id: battery_voltage
    name: "Battery Voltage"
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    update_interval: never
    lambda: |-
      if (!id(battery_adc).has_state()) {
        return NAN;
      }
      return id(battery_adc).state;

  - platform: template
    id: battery_percent
    name: "Battery"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    state_class: measurement
    update_interval: never
    lambda: |-
      if (!id(battery_adc).has_state()) {
        return NAN;
      }

      float v = id(battery_adc).state;
      static float v_avg = 0;

      const float V_MIN = 3.30;
      const float V_MAX = 4.20;
      const float GAMMA = 2.2;

      if (isnan(v) || v < 2.5 || v > 4.5) {
        return NAN;
      }

      v_avg = (v_avg == 0) ? v : (v_avg * 0.8f + v * 0.2f);
      v = v_avg;

      if (v <= V_MIN) return 0;
      if (v >= V_MAX) return 100;

      float x = (v - V_MIN) / (V_MAX - V_MIN);
      float pct = powf(x, GAMMA) * 100.0f;

      return (int)roundf(pct);

script:
  - id: update_battery
    mode: single
    then:
      - component.update: battery_adc
      - delay: 50ms
      - component.update: battery_voltage
      - component.update: battery_percent
      - lambda: |-
          id(last_battery_update) = millis();
          id(updated_ui) = true;