substitutions:
  BOARD: "esp32dev"
  DEVICE_NAME: "esp32-remote"
  FRIENDLY_NAME: "ESP32 OLED Remote"
  TEMPERATURE_UNIT: "F" # Set to "C" when Home Assistant climate values are Celsius
  SLEEP_DURATION: "120" # seconds until auto-sleep
  DEEP_SLEEP_DURATION: "360min"
  VERSION: "2.0 beta"
  PIN_WAKE: "0"
  PIN_I2C_SDA: "27"
  PIN_I2C_SCL: "25"
  PIN_BTN_NEXT: "33"
  PIN_BTN_PREV: "22"
  PIN_BTN_MODE: "14"
  PIN_BTN_AUTOMATION: "26"
  PIN_BTN_CIRCLE: "23"
  PIN_BTN_DIMMER_UP: "19"
  PIN_BTN_DIMMER_DOWN: "18"
  PIN_OLED_EN: "15"

packages:
  select_pcb: !include 
    # Select the appropriate PCB file to include based on your remote control hardware revision.
    file: pcb_proto.yaml
    #file: pcb_rev31.yaml

font:
  - file: "fonts/arial-bold.ttf"
    id: tiny_font
    size: 9
    glyphs: &arial_glyphs ['0123456789.ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz_ :<>%[](){}|''!?/+-&*=$#@^°']
  - file: "fonts/arial-bold.ttf"
    id: small_font
    size: 10
    glyphs: *arial_glyphs
  - file: "fonts/arial-bold.ttf"
    id: medium_font
    size: 13
    glyphs: *arial_glyphs
  - file:
      type: gfonts
      family: Material+Symbols+Rounded
      weight: 400
    id: symbols
    size: 12
    glyphs: [
      "\ue90f", # light_mode
      "\ue1ac", # brightness_high
      "\ue3a1", # audiotrack
      "\ue88a", # home
      "\uf076", # thermostat
      "\ue81a", # sunny
      "\ue88e", # info
      "\ue897", # lock 
    ]
  - file:
      type: gfonts
      family: Material+Symbols+Rounded
      weight: 400
    id: medium_symbols
    size: 15
    glyphs: [
      "\ueac3", # keyboard_double_arrow_left
      "\ueac9", # keyboard_double_arrow_right
      "\ue045", # skip_previous
      "\ue044", # skip_next
      "\ue63e", # wifi
      "\ue8ac", # power_settings_new
    ]

esphome:
  name: ${DEVICE_NAME}
  friendly_name: ${FRIENDLY_NAME}
  min_version: 2026.1.0
  name_add_mac_suffix: false
  includes:
    - ha_entities.h
  on_boot:
    - priority: 250
      then:
        - lambda: |-
            ensure_light_status_tracker();
            id(last_active) = millis() / 1000;
            uint64_t state = id(persisted_ui_state);
            int restored_contrast = state & 0x0F;
            int restored_mode = (state >> 4) & 0x07;
            id(selected_light_index) = (state >> 7) & 0x3F;
            id(selected_climate_index) = (state >> 13) & 0x3F;
            id(selected_lock_index) = (state >> 19) & 0x3F;
            id(selected_media_index) = (state >> 25) & 0x3F;
            id(selected_automation_index) = (state >> 31) & 0x3F;
            id(selected_weather_index) = (state >> 37) & 0x3F;
            id(selected_time_index) = (state >> 43) & 0x3F;

            if (restored_contrast >= 1 && restored_contrast <= 10) {
              id(contrast) = restored_contrast;
            } else {
              id(contrast) = 5;
            }
            id(oled_display).set_contrast(id(contrast) * 1.0f / 10.0f);

            if (restored_mode < 0 || restored_mode >= REMOTE_MODE_COUNT) {
              id(current_mode) = first_available_mode();
            } else {
              RemoteMode restored = static_cast<RemoteMode>(restored_mode);
              id(current_mode) = mode_is_available(restored) ? restored : first_available_mode();
            }
            id(updated_ui) = true;
        - script.execute: update_selected_item

preferences:
  flash_write_interval: 5s

esp32:
  board: ${BOARD}
  flash_size: 4MB
  framework:
    type: arduino
    advanced:
      minimum_chip_revision: "3.1"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 10dB
  fast_connect: true
  power_save_mode: LIGHT

api:
  homeassistant_states: true
  reboot_timeout: 0s
  encryption:
    key: !secret encryption_key
  on_client_connected:
    - if:
        condition:
          api.connected:
            state_subscription_only: true
        then:
          - lambda: |-
              if (id(show_boot_screen)) {
                id(show_boot_screen) = false;
                id(updated_ui) = true;
              }

json:

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time_sync:
      then:
        - lambda: |-
            id(updated_ui) = true;
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - lambda: |-
              id(updated_ui) = true;

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: DEBUG # INFO

deep_sleep:
  id: go_sleep
  sleep_duration: ${DEEP_SLEEP_DURATION}
  wakeup_pin:
    number: ${PIN_WAKE}
    allow_other_uses: true
    ignore_strapping_warning: true
  wakeup_pin_mode: INVERT_WAKEUP

i2c:
  sda: ${PIN_I2C_SDA}
  scl: ${PIN_I2C_SCL}
  frequency: 400kHz
  scan: false

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    rotation: 180
    contrast: 0.5
    id: oled_display

globals:
  - id: contrast
    type: int
    initial_value: '5'

  - id: last_active
    type: int
    restore_value: no
    initial_value: '0'

  - id: last_brightness_interaction
