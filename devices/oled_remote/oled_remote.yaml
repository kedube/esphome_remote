substitutions:
  BOARD: "esp32dev"
  DEVICE_NAME: "esp32-remote"
  FRIENDLY_NAME: "ESP32 OLED Remote"
  SLEEP_DURATION: "120" # seconds until auto-sleep
  DEEP_SLEEP_DURATION: "360min"
  VERSION: "2.0 alpha"
  PIN_WAKE: "0"
  PIN_I2C_SDA: "27"
  PIN_I2C_SCL: "25"
  PIN_BTN_NEXT: "33"
  PIN_BTN_PREV: "22"
  PIN_BTN_CONTRAST: "32"
  PIN_BTN_MODE: "14"
  PIN_BTN_AUTOMATION: "26"
  PIN_BTN_LIGHTBULB: "23"
  PIN_BTN_PLAY_PAUSE: "5"
  PIN_BTN_DIMMER_UP: "19"
  PIN_BTN_DIMMER_DOWN: "18"

font:
  - file: "fonts/arial-bold.ttf"
    id: tiny_font
    size: 9
    glyphs: [0123456789.ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz, "_", " ", ":", "<", ">", "%", "[", "]", "(", ")", "'", "!", "?", "\u00B0"]
  - file: "fonts/arial-bold.ttf"
    id: small_font
    size: 10
    glyphs: [0123456789.ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz, "_", " ", ":", "<", ">", "%", "[", "]", "(", ")", "'", "!", "?", "\u00B0"]
  - file: "fonts/arial-bold.ttf"
    id: medium_font
    size: 13
    glyphs: [0123456789.ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz, "_", " ", ":", "<", ">", "%", "[", "]", "(", ")", "'", "!", "?", "\u00B0"]
  - file:
      type: gfonts
      family: Material+Symbols+Rounded
      weight: 400
    id: symbols
    size: 12
    glyphs: [
      "\ue90f", # light_mode
      "\ue1ac", # brightness_high
      "\ue3a1", # audiotrack
      "\ue88a", # home
      "\uf076", # thermostat
      "\uf537", # heat
      "\ueb3b", # ac_unit
    ]
  - file:
      type: gfonts
      family: Material+Symbols+Rounded
      weight: 400
    id: medium_symbols
    size: 15
    glyphs: [
      "\ueac3", # keyboard_double_arrow_left
      "\ueac9", # keyboard_double_arrow_right
      "\ue045", # skip_previous
      "\ue044", # skip_next
      "\ue63e", # wifi
      "\ue8ac", # power_settings_new
    ]

esphome:
  name: ${DEVICE_NAME}
  friendly_name: ${FRIENDLY_NAME}
  min_version: 2026.1.0
  name_add_mac_suffix: false
  includes:
    - ha_entities.h
  on_boot:
    - priority: 250
      then:
        - lambda: |-
            ensure_light_status_tracker();
            id(last_active) = millis() / 1000;
            uint32_t state = id(persisted_ui_state);
            int restored_contrast = state & 0x0F;
            int restored_mode = (state >> 4) & 0x03;
            id(selected_light_index) = (state >> 6) & 0x3F;
            id(selected_climate_index) = (state >> 12) & 0x3F;
            id(selected_media_index) = (state >> 18) & 0x3F;
            id(selected_automation_index) = (state >> 24) & 0x3F;

            if (restored_contrast >= 1 && restored_contrast <= 10) {
              id(contrast) = restored_contrast;
            } else {
              id(contrast) = 5;
            }
            id(oled_display).set_contrast(id(contrast) * 1.0f / 10.0f);

            if (restored_mode < 0 || restored_mode >= REMOTE_MODE_COUNT) {
              id(current_mode) = REMOTE_MODE_LIGHTING;
            } else {
              id(current_mode) = restored_mode;
            }
            id(updated_ui) = true;
        - script.execute: update_selected_item

preferences:
  flash_write_interval: 5s

esp32:
  board: ${BOARD}
  flash_size: 4MB
  framework:
    type: arduino
    advanced:
      minimum_chip_revision: "3.1"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 10dB
  fast_connect: true
  power_save_mode: LIGHT

api:
  homeassistant_states: true
  reboot_timeout: 0s
  encryption:
    key: !secret encryption_key
  on_client_connected:
    - if:
        condition:
          api.connected:
            state_subscription_only: true
        then:
          - lambda: |-
              if (id(show_boot_screen)) {
                id(show_boot_screen) = false;
                id(updated_ui) = true;
              }

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: DEBUG # INFO

deep_sleep:
  id: go_sleep
  sleep_duration: ${DEEP_SLEEP_DURATION}
  wakeup_pin:
    number: ${PIN_WAKE}
    allow_other_uses: true
    ignore_strapping_warning: true
  wakeup_pin_mode: INVERT_WAKEUP

i2c:
  sda: ${PIN_I2C_SDA}
  scl: ${PIN_I2C_SCL}
  frequency: 400kHz
  scan: false

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    rotation: 180
    contrast: 0.5
    id: oled_display

globals:
  - id: contrast
    type: int
    initial_value: '5'

  - id: last_active
    type: int
    restore_value: no
    initial_value: '0'

  - id: last_brightness_interaction
    type: uint32_t
    initial_value: '0'

  - id: last_contrast_interaction
    type: uint32_t
    initial_value: '0'

  - id: last_climate_interaction
    type: uint32_t
    initial_value: '0'

  - id: last_climate_target_focus_interaction
    type: uint32_t
    initial_value: '0'

  - id: last_media_interaction
    type: uint32_t
    initial_value: '0'

  - id: last_automation_interaction
    type: uint32_t
    initial_value: '0'

  - id: updated_ui
    type: bool
    initial_value: 'true'

  - id: show_boot_screen
    type: bool
    initial_value: 'true'

  - id: persisted_ui_state
    type: uint32_t
    initial_value: '0'
    restore_value: True

  - id: current_mode
    type: int
    initial_value: '0'

  - id: selected_light_index
    type: int
    initial_value: '0'

  - id: selected_climate_index
    type: int
    initial_value: '0'

  - id: selected_media_index
    type: int
    initial_value: '0'

  - id: selected_automation_index
    type: int
    initial_value: '0'

  - id: selected_item_name
    type: std::string
    initial_value: '"Office Light"'

  - id: selected_item_entity
    type: std::string
    initial_value: '"light.office_light"'

  - id: selected_item_state
    type: std::string
    initial_value: '"unknown"'

  - id: selected_brightness_pct
    type: int
    initial_value: '0'

  - id: selected_climate_target_temp
    type: float
    initial_value: 'NAN'

  - id: selected_climate_target_temp_low
    type: float
    initial_value: '72.0'

  - id: selected_climate_target_temp_high
    type: float
    initial_value: '76.0'

  - id: selected_climate_current_temp
    type: float
    initial_value: 'NAN'

  - id: selected_climate_hvac_action
    type: std::string
    initial_value: '"unknown"'

  - id: selected_climate_preset
    type: std::string
    initial_value: '""'

  - id: last_climate_mode
    type: std::string
    initial_value: '"heat"'

  - id: climate_target_focus
    type: int
    initial_value: '0'

  - id: climate_target_focus_value
    type: float
    initial_value: 'NAN'

  - id: selected_media_volume_pct
    type: int
    initial_value: '0'

  - id: selected_media_title
    type: std::string
    initial_value: '""'

  - id: selected_media_artist
    type: std::string
    initial_value: '""'

  - id: selected_media_source
    type: std::string
    initial_value: '""'

  - id: selected_automation_state
    type: std::string
    initial_value: '"unknown"'

  - id: last_automation_feedback
    type: std::string
    initial_value: '""'

binary_sensor:
  - platform: gpio
    pin:
      allow_other_uses: true
      number: ${PIN_WAKE}
      ignore_strapping_warning: true
      mode:
        input: True
        pullup: True
    name: "Remote Power Button"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: turn_off

  - platform: gpio
    pin:
      number: ${PIN_BTN_PREV}
      mode:
        input: True
        pullup: True
    name: "Previous Mode Item"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: previous_button_action

  - platform: gpio
    pin:
      number: ${PIN_BTN_CONTRAST}
      mode:
        input: True
        pullup: True
    name: "OLED Contrast"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - lambda: |-
            id(contrast) += 1;
            if (id(contrast) > 10) id(contrast) = 1;
            float contrast_value = id(contrast) * 1.0 / 10;
            ESP_LOGD("display", "Contrast = %f", contrast_value);
            id(oled_display).set_contrast(contrast_value);
            id(last_contrast_interaction) = millis();
            id(updated_ui) = true;
        - script.execute: persist_ui_state
        - script.execute: update_display

  - platform: gpio
    pin:
      number: ${PIN_BTN_NEXT}
      mode:
        input: True
        pullup: True
    name: "Next Mode Item"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: next_button_action

  - platform: gpio
    pin:
      number: ${PIN_BTN_MODE}
      mode:
        input: True
        pullup: True
    name: "Cycle Remote Mode"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: cycle_mode

  - platform: gpio
    pin:
      number: ${PIN_BTN_AUTOMATION}
      mode:
        input: True
        pullup: True
    name: "Secondary Mode Action"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: secondary_mode_action

  - platform: gpio
    pin:
      number: ${PIN_BTN_LIGHTBULB}
      mode:
        input: True
        pullup: True
    name: "Primary Mode Action"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: primary_mode_action

  - platform: gpio
    pin:
      number: ${PIN_BTN_PLAY_PAUSE}
      ignore_strapping_warning: true
      mode:
        input: True
        pullup: True
    name: "Play Pause Mode Action"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: play_pause_mode_action

  - platform: gpio
    pin:
      number: ${PIN_BTN_DIMMER_UP}
      mode:
        input: True
        pullup: True
    name: "Increase Mode Value"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: increase_mode_value

  - platform: gpio
    pin:
      number: ${PIN_BTN_DIMMER_DOWN}
      mode:
        input: True
        pullup: True
    name: "Decrease Mode Value"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: decrease_mode_value

script:
  - id: turn_off
    mode: single
    then:
      - lambda: |-
          auto it = id(oled_display);
          it->clear();
          it->print(64, 24, id(medium_symbols), COLOR_ON, display::TextAlign::CENTER, "\ue8ac");
          it->print(64, 48, id(small_font), COLOR_ON, display::TextAlign::CENTER, "POWERING OFF");
          it->display();
      - delay: 1s
      - lambda: |-
          auto it = id(oled_display);
          it->clear();
          it->display();
      - delay: 500ms
      - deep_sleep.enter: go_sleep

  - id: persist_ui_state
    then:
      - lambda: |-
          id(persisted_ui_state) =
              (uint32_t(id(selected_automation_index) & 0x3F) << 24) |
              (uint32_t(id(selected_media_index) & 0x3F) << 18) |
              (uint32_t(id(selected_climate_index) & 0x3F) << 12) |
              (uint32_t(id(selected_light_index) & 0x3F) << 6) |
              (uint32_t(id(current_mode) & 0x03) << 4) |
              uint32_t(id(contrast) & 0x0F);

  - id: update_selected_item
    then:
      - lambda: |-
          RemoteMode mode = static_cast<RemoteMode>(id(current_mode));
          int count = mode_item_count(mode);

          if (count <= 0) {
            id(selected_item_name) = "NO ITEMS";
            id(selected_item_entity) = "";
            id(selected_item_state) = "unknown";
            id(updated_ui) = true;
            return;
          }

          int &selected_index = selected_index_ref(
              mode, id(selected_light_index), id(selected_climate_index), id(selected_media_index),
              id(selected_automation_index));
          selected_index = clamp_mode_index(selected_index, count);
          int idx = selected_index;

          id(selected_item_name) = mode_item_name(mode, idx);
          id(selected_item_entity) = mode_item_entity(mode, idx);
          id(selected_item_state) = "unknown";
          id(selected_brightness_pct) = 0;
          id(selected_climate_target_temp) = NAN;
          id(selected_climate_hvac_action) = "unknown";
          id(selected_climate_preset) = "";
          id(selected_climate_target_temp_low) = NAN;
          id(selected_climate_target_temp_high) = NAN;
          id(selected_climate_current_temp) = NAN;
          id(climate_target_focus) = 0;
          id(climate_target_focus_value) = NAN;
          id(last_climate_target_focus_interaction) = 0;
          id(selected_media_title) = "";
          id(selected_media_artist) = "";
          id(selected_media_source) = "";
          id(selected_automation_state) = "unknown";
          id(updated_ui) = true;

          request_mode_status(mode, idx);
      - script.execute: persist_ui_state
      - script.execute: sync_current_mode_status
      - script.execute: update_display

  - id: boot_screen
    then:
      - lambda: |-
          auto it = id(oled_display);
          it->clear();
          it->print(64, 8, id(medium_symbols), COLOR_ON, display::TextAlign::CENTER, "\ue63e");
          it->print(64, 26, id(small_font), COLOR_ON, display::TextAlign::CENTER, "CONNECTING TO");
          it->print(64, 38, id(small_font), COLOR_ON, display::TextAlign::CENTER, "HOME ASSISTANT");
          it->print(64, 56, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, "V${VERSION}");
          it->display();

  - id: cycle_mode
    then:
      - lambda: |-
          id(current_mode) = (id(current_mode) + 1) % REMOTE_MODE_COUNT;
          id(last_brightness_interaction) = 0;
          id(last_climate_interaction) = 0;
          id(last_media_interaction) = 0;
          id(last_automation_interaction) = 0;
          id(updated_ui) = true;
      - script.execute: update_selected_item

  - id: sync_current_mode_status
    then:
      - lambda: |-
          RemoteMode mode = static_cast<RemoteMode>(id(current_mode));
          int idx = selected_index_ref(
              mode, id(selected_light_index), id(selected_climate_index), id(selected_media_index),
              id(selected_automation_index));
          idx = clamp_mode_index(idx, mode_item_count(mode));

          if (mode == REMOTE_MODE_LIGHTING) {
            const std::string &state = selected_light_state(idx);
            float brightness = selected_light_brightness(idx);
            std::string next_state = id(selected_item_state);
            int next_brightness_pct = id(selected_brightness_pct);

            if (state == "on") {
              next_state = "on";
              if (selected_light_has_brightness(idx) && !isnan(brightness) && brightness > 0) {
                int pct = (int) roundf((brightness / 255.0f) * 100.0f);
                if (pct < 1) pct = 1;
                if (pct > 100) pct = 100;
                next_brightness_pct = pct;
              } else if (next_brightness_pct <= 0) {
                next_brightness_pct = 100;
              }
            } else if (state == "off") {
              next_state = "off";
              next_brightness_pct = 0;
            } else {
              next_state = "unknown";
              request_selected_light_status(idx);
            }

            if (next_state != id(selected_item_state) || next_brightness_pct != id(selected_brightness_pct)) {
              id(selected_item_state) = next_state;
              id(selected_brightness_pct) = next_brightness_pct;
              id(updated_ui) = true;
            }
          } else if (mode == REMOTE_MODE_CLIMATE) {
            const std::string &state = selected_climate_state(idx);
            const std::string &hvac_action = climate_hvac_action_for_index(idx);
            const std::string &preset = selected_climate_preset_mode(idx);
            float target = selected_climate_target_temperature(idx);
            float target_low = selected_climate_target_temperature_low(idx);
            float target_high = selected_climate_target_temperature_high(idx);
            float current = selected_climate_current_temperature(idx);

            if (state == "unknown") {
              request_mode_status(mode, idx);
            } else {
              id(selected_item_state) = state;
              if (state != "off") {
                id(last_climate_mode) = state;
              }
              if (!hvac_action.empty()) {
                id(selected_climate_hvac_action) = hvac_action;
              }
              if (!isnan(target)) {
                id(selected_climate_target_temp) = target;
              }
              if (!isnan(target_low)) {
                id(selected_climate_target_temp_low) = target_low;
              }
              if (!isnan(target_high)) {
                id(selected_climate_target_temp_high) = target_high;
              }
              if (!isnan(current)) {
                id(selected_climate_current_temp) = current;
              }
              id(selected_climate_preset) = preset;
              id(updated_ui) = true;
            }
          } else if (mode == REMOTE_MODE_MUSIC) {
            const std::string &state = selected_media_state(idx);
            const std::string &title = media_title_for_index(idx);
            const std::string &artist = media_artist_for_index(idx);
            const std::string &source = media_source_for_index(idx);
            float volume = selected_media_volume(idx);

            if (state == "unknown") {
              request_mode_status(mode, idx);
            } else {
              id(selected_item_state) = state;
              id(selected_media_title) = title;
              id(selected_media_artist) = artist;
              id(selected_media_source) = source;
              if (!isnan(volume)) {
                int pct = (int) roundf(volume * 100.0f);
                if (pct < 0) pct = 0;
                if (pct > 100) pct = 100;
                id(selected_media_volume_pct) = pct;
              }
              id(updated_ui) = true;
            }
          } else if (mode == REMOTE_MODE_AUTOMATION) {
            const std::string &state = automation_state_for_index(idx);
            if (automation_supports_enabled_state(idx)) {
              id(selected_automation_state) = state;
              id(selected_item_state) = state;
            } else {
              id(selected_automation_state) = "ready";
              id(selected_item_state) = "ready";
            }
            if (state == "unknown") {
              request_mode_status(mode, idx);
            }
            id(updated_ui) = true;
          }

  - id: shift_selected_item
    parameters:
      step: int
    then:
      - lambda: |-
          RemoteMode mode = static_cast<RemoteMode>(id(current_mode));
          int count = mode_item_count(mode);
          if (count <= 0) {
            return;
          }

          int &selected_index = selected_index_ref(
              mode, id(selected_light_index), id(selected_climate_index), id(selected_media_index),
              id(selected_automation_index));
          selected_index = wrapped_mode_index(selected_index, count, step);
      - script.execute: update_selected_item

  - id: select_next_item
    then:
      - script.execute:
          id: shift_selected_item
          step: 1

  - id: select_previous_item
    then:
      - script.execute:
          id: shift_selected_item
          step: -1

  - id: previous_button_action
    then:
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_MUSIC;'
          then:
            - script.execute: media_previous_track
          else:
            - script.execute: select_previous_item

  - id: next_button_action
    then:
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_MUSIC;'
          then:
            - script.execute: media_next_track
          else:
            - script.execute: select_next_item

  - id: toggle_selected_light
    mode: queued
    then:
      - if:
          condition:
            lambda: 'return id(selected_item_state) == "on";'
          then:
            - homeassistant.service:
                service: light.turn_off
                data:
                  entity_id: !lambda 'return id(selected_item_entity);'
            - lambda: |-
                id(selected_item_state) = "off";
                id(updated_ui) = true;
            - script.execute: update_display
          else:
            - homeassistant.service:
                service: light.turn_on
                data:
                  entity_id: !lambda 'return id(selected_item_entity);'
                  brightness_pct: !lambda |-
                    if (id(selected_brightness_pct) <= 0) {
                      return 100;
                    }
                    return id(selected_brightness_pct);
            - lambda: |-
                id(selected_item_state) = "on";
                if (id(selected_brightness_pct) <= 0) {
                  id(selected_brightness_pct) = 100;
                }
                id(updated_ui) = true;
            - script.execute: update_display

  - id: increase_brightness
    mode: queued
    then:
      - lambda: |-
          int next = id(selected_brightness_pct) + 10;
          if (next > 100) next = 100;
          if (next < 10) next = 10;
          id(selected_brightness_pct) = next;
          id(selected_item_state) = "on";
          id(last_brightness_interaction) = millis();
          id(updated_ui) = true;
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: !lambda 'return id(selected_item_entity);'
            brightness_pct: !lambda 'return id(selected_brightness_pct);'
      - script.execute: update_display

  - id: decrease_brightness
    mode: queued
    then:
      - if:
          condition:
            lambda: 'return id(selected_brightness_pct) <= 10;'
          then:
            - homeassistant.service:
                service: light.turn_off
                data:
                  entity_id: !lambda 'return id(selected_item_entity);'
            - lambda: |-
                id(selected_brightness_pct) = 0;
                id(selected_item_state) = "off";
                id(last_brightness_interaction) = millis();
                id(updated_ui) = true;
            - script.execute: update_display
          else:
            - lambda: |-
                int next = id(selected_brightness_pct) - 10;
                if (next < 1) next = 1;
                id(selected_brightness_pct) = next;
                id(selected_item_state) = "on";
                id(last_brightness_interaction) = millis();
                id(updated_ui) = true;
            - homeassistant.service:
                service: light.turn_on
                data:
                  entity_id: !lambda 'return id(selected_item_entity);'
                  brightness_pct: !lambda 'return id(selected_brightness_pct);'
            - script.execute: update_display

  - id: toggle_selected_climate_power
    mode: queued
    then:
      - if:
          condition:
            lambda: 'return id(selected_item_state) == "off";'
          then:
            - homeassistant.service:
                service: climate.set_hvac_mode
                data:
                  entity_id: !lambda 'return id(selected_item_entity);'
                  hvac_mode: !lambda 'return id(last_climate_mode);'
            - lambda: |-
                id(selected_item_state) = id(last_climate_mode);
                id(updated_ui) = true;
          else:
            - lambda: |-
                if (id(selected_item_state) != "unknown" && id(selected_item_state) != "off") {
                  id(last_climate_mode) = id(selected_item_state);
                }
            - homeassistant.service:
                service: climate.set_hvac_mode
                data:
                  entity_id: !lambda 'return id(selected_item_entity);'
                  hvac_mode: "off"
            - lambda: |-
                id(selected_item_state) = "off";
                id(updated_ui) = true;
      - script.execute: update_display

  - id: cycle_selected_climate_mode
    mode: queued
    then:
      - lambda: |-
          std::string current = id(selected_item_state);
          if (current == "off" || current == "unknown") {
            current = id(last_climate_mode);
          }

          std::string next = "heat";
          if (current == "heat") {
            next = "cool";
          } else if (current == "cool") {
            next = "heat_cool";
          } else if (current == "heat_cool") {
            next = "heat";
          }

          id(last_climate_mode) = next;
          id(selected_item_state) = next;
          id(updated_ui) = true;
      - homeassistant.service:
          service: climate.set_hvac_mode
          data:
            entity_id: !lambda 'return id(selected_item_entity);'
            hvac_mode: !lambda 'return id(last_climate_mode);'
      - script.execute: update_display

  - id: adjust_climate_temperature
    parameters:
      target_focus: int
      delta: float
    mode: queued
    then:
      - lambda: |-
          bool dual_target = id(selected_item_state) == "heat_cool" &&
                             !isnan(id(selected_climate_target_temp_low)) &&
                             !isnan(id(selected_climate_target_temp_high));
          bool high_focus = dual_target && target_focus == 2;
          float next = dual_target
                           ? (high_focus ? id(selected_climate_target_temp_high) : id(selected_climate_target_temp_low))
                           : id(selected_climate_target_temp);

          if (isnan(next) || next < 40.0f) {
            next = high_focus ? 76.0f : (dual_target ? 68.0f : 72.0f);
          }

          next += delta;
          if (next > 85.0f) next = 85.0f;
          if (next < 55.0f) next = 55.0f;

          if (dual_target) {
            if (high_focus) {
              if (!isnan(id(selected_climate_target_temp_low)) && next <= id(selected_climate_target_temp_low)) {
                next = id(selected_climate_target_temp_low) + 1.0f;
              }
              id(selected_climate_target_temp_high) = next;
            } else {
              if (!isnan(id(selected_climate_target_temp_high)) && next >= id(selected_climate_target_temp_high)) {
                next = id(selected_climate_target_temp_high) - 1.0f;
              }
              id(selected_climate_target_temp_low) = next;
            }
            id(climate_target_focus_value) = next;
            id(climate_target_focus) = target_focus;
          } else {
            if (next > 85.0f) next = 85.0f;
            if (next < 55.0f) next = 55.0f;
            id(selected_climate_target_temp) = next;
            id(selected_climate_target_temp_low) = next;
            id(selected_climate_target_temp_high) = next;
            id(climate_target_focus_value) = next;
            id(climate_target_focus) = 1;
          }

          id(last_climate_target_focus_interaction) = millis();
          id(last_climate_interaction) = millis();
          id(updated_ui) = true;
      - if:
          condition:
            lambda: 'return id(selected_item_state) == "heat_cool" && !isnan(id(selected_climate_target_temp_low)) && !isnan(id(selected_climate_target_temp_high));'
          then:
            - homeassistant.service:
                service: climate.set_temperature
                data:
                  entity_id: !lambda 'return id(selected_item_entity);'
                  target_temp_low: !lambda 'return id(selected_climate_target_temp_low);'
                  target_temp_high: !lambda 'return id(selected_climate_target_temp_high);'
          else:
            - homeassistant.service:
                service: climate.set_temperature
                data:
                  entity_id: !lambda 'return id(selected_item_entity);'
                  temperature: !lambda 'return id(selected_climate_target_temp);'
      - script.execute: update_display

  - id: climate_temperature_up
    mode: queued
    then:
      - script.execute:
          id: adjust_climate_temperature
          target_focus: 1
          delta: 1.0

  - id: climate_temperature_down
    mode: queued
    then:
      - script.execute:
          id: adjust_climate_temperature
          target_focus: 1
          delta: -1.0

  - id: climate_temperature_high_up
    mode: queued
    then:
      - script.execute:
          id: adjust_climate_temperature
          target_focus: 2
          delta: 1.0

  - id: climate_temperature_high_down
    mode: queued
    then:
      - script.execute:
          id: adjust_climate_temperature
          target_focus: 2
          delta: -1.0

  - id: cycle_selected_climate_preset
    mode: queued
    then:
      - if:
          condition:
            lambda: 'return climate_supports_preset(id(selected_climate_index));'
          then:
            - lambda: |-
                std::string next = "home";
                if (id(selected_climate_preset) == "home") {
                  next = "away";
                } else if (id(selected_climate_preset) == "away") {
                  next = "sleep";
                }
                id(selected_climate_preset) = next;
                id(last_climate_interaction) = millis();
                id(updated_ui) = true;
            - homeassistant.service:
                service: climate.set_preset_mode
                data:
                  entity_id: !lambda 'return id(selected_item_entity);'
                  preset_mode: !lambda 'return id(selected_climate_preset);'
            - script.execute: update_display

  - id: media_play_pause
    mode: queued
    then:
      - homeassistant.service:
          service: media_player.media_play_pause
          data:
            entity_id: !lambda 'return id(selected_item_entity);'
      - lambda: |-
          if (id(selected_item_state) == "playing") {
            id(selected_item_state) = "paused";
          } else {
            id(selected_item_state) = "playing";
          }
          id(updated_ui) = true;
      - script.execute: update_display

  - id: media_previous_track
    mode: queued
    then:
      - homeassistant.service:
          service: media_player.media_previous_track
          data:
            entity_id: !lambda 'return id(selected_item_entity);'
      - lambda: |-
          id(updated_ui) = true;
      - script.execute: update_display

  - id: media_next_track
    mode: queued
    then:
      - homeassistant.service:
          service: media_player.media_next_track
          data:
            entity_id: !lambda 'return id(selected_item_entity);'
      - lambda: |-
          id(updated_ui) = true;
      - script.execute: update_display

  - id: adjust_media_volume
    parameters:
      delta: int
    mode: queued
    then:
      - lambda: |-
          int next = id(selected_media_volume_pct) + delta;
          if (next > 100) next = 100;
          if (next < 0) next = 0;
          id(selected_media_volume_pct) = next;
          id(last_media_interaction) = millis();
          id(updated_ui) = true;
      - homeassistant.service:
          service: media_player.volume_set
          data:
            entity_id: !lambda 'return id(selected_item_entity);'
            volume_level: !lambda 'return id(selected_media_volume_pct) / 100.0f;'
      - script.execute: update_display

  - id: media_volume_up
    mode: queued
    then:
      - script.execute:
          id: adjust_media_volume
          delta: 5

  - id: media_volume_down
    mode: queued
    then:
      - script.execute:
          id: adjust_media_volume
          delta: -5

  - id: trigger_selected_automation
    mode: queued
    then:
      - if:
          condition:
            lambda: 'return automation_kind(id(selected_automation_index)) == AUTOMATION_KIND_AUTOMATION;'
          then:
            - homeassistant.action:
                action: automation.trigger
                data:
                  entity_id: !lambda 'return id(selected_item_entity);'
                on_success:
                  - lambda: |-
                      id(last_automation_feedback) = "SUCCESS";
                      id(last_automation_interaction) = millis();
                      id(updated_ui) = true;
                  - script.execute: update_display
                on_error:
                  - lambda: |-
                      id(last_automation_feedback) = "FAILED";
                      id(last_automation_interaction) = millis();
                      id(updated_ui) = true;
                  - script.execute: update_display
          else:
            - if:
                condition:
                  lambda: 'return automation_kind(id(selected_automation_index)) == AUTOMATION_KIND_SCENE;'
                then:
                  - homeassistant.action:
                      action: scene.turn_on
                      data:
                        entity_id: !lambda 'return id(selected_item_entity);'
                      on_success:
                        - lambda: |-
                            id(last_automation_feedback) = "SUCCESS";
                            id(last_automation_interaction) = millis();
                            id(updated_ui) = true;
                        - script.execute: update_display
                      on_error:
                        - lambda: |-
                            id(last_automation_feedback) = "FAILED";
                            id(last_automation_interaction) = millis();
                            id(updated_ui) = true;
                        - script.execute: update_display
                else:
                  - homeassistant.action:
                      action: script.turn_on
                      data:
                        entity_id: !lambda 'return id(selected_item_entity);'
                      on_success:
                        - lambda: |-
                            id(last_automation_feedback) = "SUCCESS";
                            id(last_automation_interaction) = millis();
                            id(updated_ui) = true;
                        - script.execute: update_display
                      on_error:
                        - lambda: |-
                            id(last_automation_feedback) = "FAILED";
                            id(last_automation_interaction) = millis();
                            id(updated_ui) = true;
                        - script.execute: update_display

  - id: toggle_selected_automation_enabled
    mode: queued
    then:
      - if:
          condition:
            lambda: 'return automation_supports_enabled_state(id(selected_automation_index));'
          then:
            - if:
                condition:
                  lambda: 'return id(selected_automation_state) == "on";'
                then:
                  - homeassistant.service:
                      service: automation.turn_off
                      data:
                        entity_id: !lambda 'return id(selected_item_entity);'
                  - lambda: |-
                      id(selected_automation_state) = "off";
                      id(selected_item_state) = "off";
                      id(last_automation_feedback) = "DISABLED";
                      id(last_automation_interaction) = millis();
                      id(updated_ui) = true;
                else:
                  - homeassistant.service:
                      service: automation.turn_on
                      data:
                        entity_id: !lambda 'return id(selected_item_entity);'
                  - lambda: |-
                      id(selected_automation_state) = "on";
                      id(selected_item_state) = "on";
                      id(last_automation_feedback) = "ENABLED";
                      id(last_automation_interaction) = millis();
                      id(updated_ui) = true;
          else:
            - lambda: |-
                id(last_automation_feedback) = "TRIGGER ONLY";
                id(last_automation_interaction) = millis();
                id(updated_ui) = true;
      - script.execute: update_display

  - id: primary_mode_action
    then:
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_LIGHTING;'
          then:
            - script.execute: toggle_selected_light
          else:
            - if:
                condition:
                  lambda: 'return id(current_mode) == REMOTE_MODE_CLIMATE;'
                then:
                  - if:
                      condition:
                        lambda: 'return !isnan(id(selected_climate_target_temp_low)) && !isnan(id(selected_climate_target_temp_high)) && (id(selected_item_state) == "heat_cool" || id(selected_climate_target_temp_low) != id(selected_climate_target_temp_high));'
                      then:
                        - script.execute: climate_temperature_high_up
                      else:
                        - script.execute: toggle_selected_climate_power
                else:
                  - if:
                      condition:
                        lambda: 'return id(current_mode) == REMOTE_MODE_MUSIC;'
                      then:
                        - script.execute: media_previous_track
                      else:
                        - script.execute: trigger_selected_automation

  - id: secondary_mode_action
    then:
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_CLIMATE;'
          then:
            - script.execute: cycle_selected_climate_preset
          else:
            - if:
                condition:
                  lambda: 'return id(current_mode) == REMOTE_MODE_MUSIC;'
                then:
                  - script.execute: select_next_item
                else:
                  - if:
                      condition:
                        lambda: 'return id(current_mode) == REMOTE_MODE_AUTOMATION;'
                      then:
                        - script.execute: toggle_selected_automation_enabled

  - id: play_pause_mode_action
    then:
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_LIGHTING;'
          then:
            - script.execute: toggle_selected_light
          else:
            - if:
                condition:
                  lambda: 'return id(current_mode) == REMOTE_MODE_CLIMATE;'
                then:
                  - if:
                      condition:
                        lambda: 'return !isnan(id(selected_climate_target_temp_low)) && !isnan(id(selected_climate_target_temp_high)) && (id(selected_item_state) == "heat_cool" || id(selected_climate_target_temp_low) != id(selected_climate_target_temp_high));'
                      then:
                        - script.execute: climate_temperature_high_down
                      else:
                        - script.execute: cycle_selected_climate_mode
                else:
                  - if:
                      condition:
                        lambda: 'return id(current_mode) == REMOTE_MODE_MUSIC;'
                      then:
                        - script.execute: media_play_pause
                      else:
                        - script.execute: trigger_selected_automation

  - id: increase_mode_value
    then:
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_LIGHTING;'
          then:
            - script.execute: increase_brightness
          else:
            - if:
                condition:
                  lambda: 'return id(current_mode) == REMOTE_MODE_CLIMATE;'
                then:
                  - script.execute: climate_temperature_up
                else:
                  - if:
                      condition:
                        lambda: 'return id(current_mode) == REMOTE_MODE_MUSIC;'
                      then:
                        - script.execute: media_volume_up

  - id: decrease_mode_value
    then:
      - if:
          condition:
            lambda: 'return id(current_mode) == REMOTE_MODE_LIGHTING;'
          then:
            - script.execute: decrease_brightness
          else:
            - if:
                condition:
                  lambda: 'return id(current_mode) == REMOTE_MODE_CLIMATE;'
                then:
                  - script.execute: climate_temperature_down
                else:
                  - if:
                      condition:
                        lambda: 'return id(current_mode) == REMOTE_MODE_MUSIC;'
                      then:
                        - script.execute: media_volume_down

  - id: update_display
    then:
      - if:
          condition:
            lambda: 'return id(updated_ui) == true;'
          then:
            - lambda: |-
                auto it = id(oled_display);
                char status_line[27];
                char footer_line[27];
                char detail_line[27];
                const int bar_x = 14;
                const int bar_y = 45;
                const int bar_w = 100;
                const int bar_h = 8;
                int bar_fill = 0;
                RemoteMode mode = static_cast<RemoteMode>(id(current_mode));
                uint32_t now = millis();
                status_line[0] = '\0';
                footer_line[0] = '\0';
                detail_line[0] = '\0';
                bool show_brightness_bar =
                    id(last_brightness_interaction) > 0 && (now - id(last_brightness_interaction)) <= 3000 &&
                    id(selected_item_state) == "on" && mode == REMOTE_MODE_LIGHTING;
                bool show_contrast_feedback =
                    id(last_contrast_interaction) > 0 && (now - id(last_contrast_interaction)) <= 3000;
                bool show_climate_feedback =
                    id(last_climate_interaction) > 0 && (now - id(last_climate_interaction)) <= 3000 &&
                    mode == REMOTE_MODE_CLIMATE;
                bool show_climate_target_focus =
                    id(last_climate_target_focus_interaction) > 0 &&
                    (now - id(last_climate_target_focus_interaction)) <= 5000 &&
                    id(climate_target_focus) != 0 && mode == REMOTE_MODE_CLIMATE;
                bool show_media_feedback =
                    id(last_media_interaction) > 0 && (now - id(last_media_interaction)) <= 3000 &&
                    mode == REMOTE_MODE_MUSIC;
                bool show_automation_feedback =
                    id(last_automation_interaction) > 0 && (now - id(last_automation_interaction)) <= 5000 &&
                    mode == REMOTE_MODE_AUTOMATION;

                auto upper = [](std::string text) {
                  for (auto &ch : text) {
                    if (ch >= 'a' && ch <= 'z') {
                      ch = ch - 'a' + 'A';
                    } else if (ch == '_') {
                      ch = ' ';
                    }
                  }
                  return text;
                };
                auto has_dual_climate_target = [&]() {
                  return !isnan(id(selected_climate_target_temp_low)) &&
                         !isnan(id(selected_climate_target_temp_high)) &&
                         (id(selected_item_state) == "heat_cool" ||
                          id(selected_climate_target_temp_low) != id(selected_climate_target_temp_high));
                };
                auto draw_footer_dividers = [&]() {
                  it->filled_rectangle(0, 52, 128, 1, COLOR_ON);
                  it->filled_rectangle(38, 53, 1, 11, COLOR_ON);
                  it->filled_rectangle(90, 53, 1, 11, COLOR_ON);
                };
                auto draw_contrast_footer = [&]() {
                  snprintf(footer_line, sizeof(footer_line), "CONTRAST %d%%", id(contrast) * 10);
                  it->filled_rectangle(0, 52, 128, 1, COLOR_ON);
                  it->print(64, 58, id(small_font), COLOR_ON, display::TextAlign::CENTER, footer_line);
                };

                it->clear();
                const char *header_icon = "\ue90f";
                if (mode == REMOTE_MODE_CLIMATE) {
                  header_icon = "\uf076";
                } else if (mode == REMOTE_MODE_MUSIC) {
                  header_icon = "\ue3a1";
                } else if (mode == REMOTE_MODE_AUTOMATION) {
                  header_icon = "\ue88a";
                }
                it->print(14, -3, id(symbols), COLOR_ON, display::TextAlign::LEFT, header_icon);
                it->printf(64, 4, id(small_font), COLOR_ON, display::TextAlign::CENTER, mode_title(mode));
                it->print(114, -3, id(symbols), COLOR_ON, display::TextAlign::RIGHT, header_icon);

                it->filled_rectangle(0, 12, 128, 1, COLOR_ON);
                it->printf(64, 20, id(medium_font), COLOR_ON, display::TextAlign::CENTER, id(selected_item_name).c_str());

                if (mode == REMOTE_MODE_LIGHTING) {
                  if (id(selected_item_state) == "on") {
                    snprintf(status_line, sizeof(status_line), "ON");
                    if (show_brightness_bar) {
                      bar_fill = (bar_w - 2) * id(selected_brightness_pct) / 100;
                    }
                  } else if (id(selected_item_state) == "off") {
                    snprintf(status_line, sizeof(status_line), "OFF");
                  } else {
                    snprintf(status_line, sizeof(status_line), "SYNCING");
                  }

                  it->print(64, 35, id(small_font), COLOR_ON, display::TextAlign::CENTER, status_line);

                  if (show_brightness_bar) {
                    it->rectangle(bar_x, bar_y, bar_w, bar_h, COLOR_ON);
                    if (bar_fill > 0) {
                      it->filled_rectangle(bar_x + 1, bar_y + 1, bar_fill, bar_h - 2, COLOR_ON);
                    }
                    snprintf(footer_line, sizeof(footer_line), "BRIGHTNESS %d%%", id(selected_brightness_pct));
                    it->print(64, 58, id(small_font), COLOR_ON, display::TextAlign::CENTER, footer_line);
                  } else if (show_contrast_feedback) {
                    draw_contrast_footer();
                  } else {
                    draw_footer_dividers();
                    it->filled_rectangle(90, 54, 1, 11, COLOR_ON);
                    it->printf(10, 50, id(medium_symbols), COLOR_ON, "\ueac3");
                    it->printf(58, 51, id(symbols), COLOR_ON, "\ue1ac");
                    it->printf(104, 50, id(medium_symbols), COLOR_ON, "\ueac9");
                  }
                } else if (mode == REMOTE_MODE_CLIMATE) {
                  std::string hvac_label = upper(id(selected_item_state));
                  std::string action_label = upper(id(selected_climate_hvac_action));
                  bool has_dual_target = has_dual_climate_target();
                  if (hvac_label == "UNKNOWN") {
                    hvac_label = "SYNCING";
                  }
                  if (show_climate_target_focus) {
                    if (!isnan(id(climate_target_focus_value))) {
                      if (!has_dual_target) {
                        snprintf(status_line, sizeof(status_line), "TARGET: %.0f°F", id(climate_target_focus_value));
                      } else if (id(climate_target_focus) == 2) {
                        snprintf(status_line, sizeof(status_line), "HIGH: %.0f°F", id(climate_target_focus_value));
                      } else {
                        snprintf(status_line, sizeof(status_line), "LOW: %.0f°F", id(climate_target_focus_value));
                      }
                    }
                  } else if (!isnan(id(selected_climate_current_temp))) {
                    snprintf(status_line, sizeof(status_line), "%.0f°F", id(selected_climate_current_temp));
                  } else {
                    snprintf(status_line, sizeof(status_line), "SYNCING");
                  }
                  it->print(64, 35, id(medium_font), COLOR_ON, display::TextAlign::CENTER, status_line);

                  if (!show_climate_target_focus && has_dual_target && action_label != "UNKNOWN") {
                    snprintf(detail_line, sizeof(detail_line), "LOW: %.0f°F   HIGH: %.0f°F",
                             id(selected_climate_target_temp_low), id(selected_climate_target_temp_high));
                    it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);
                  } else if (
                      !show_climate_target_focus && !isnan(id(selected_climate_target_temp)) &&
                      action_label != "UNKNOWN") {
                    snprintf(detail_line, sizeof(detail_line), "TARGET: %.0f°F", id(selected_climate_target_temp));
                    it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);
                  }

                  if (show_contrast_feedback) {
                    draw_contrast_footer();
                  } else {
                    draw_footer_dividers();
                    it->printf(10, 50, id(medium_symbols), COLOR_ON, "\ueac3");
                    if (hvac_label != "SYNCING" && action_label != "UNKNOWN") {
                      snprintf(status_line, sizeof(status_line), "%s", action_label.c_str());
                      it->print(64, 58, id(small_font), COLOR_ON, display::TextAlign::CENTER, status_line);
                    } else {
                      it->printf(58, 51, id(symbols), COLOR_ON, "\ue1ac");
                    }
                    it->printf(104, 50, id(medium_symbols), COLOR_ON, "\ueac9");
                  }

                } else {
                  if (mode == REMOTE_MODE_MUSIC) {
                    std::string playback = upper(id(selected_item_state));
                    if (playback == "UNKNOWN") {
                      playback = "SYNCING";
                    }
                    if (!id(selected_media_title).empty()) {
                      snprintf(status_line, sizeof(status_line), "%s", id(selected_media_title).c_str());
                      it->print(64, 33, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, status_line);
                    }
                    if (!show_media_feedback && !id(selected_media_artist).empty()) {
                      snprintf(detail_line, sizeof(detail_line), "%s", id(selected_media_artist).c_str());
                      it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);
                    }

                    if (show_media_feedback) {
                      bar_fill = (bar_w - 2) * id(selected_media_volume_pct) / 100;
                      it->rectangle(bar_x, bar_y, bar_w, bar_h, COLOR_ON);
                      if (bar_fill > 0) {
                        it->filled_rectangle(bar_x + 1, bar_y + 1, bar_fill, bar_h - 2, COLOR_ON);
                      }
                      snprintf(footer_line, sizeof(footer_line), "VOLUME %d%%", id(selected_media_volume_pct));
                      it->print(64, 58, id(small_font), COLOR_ON, display::TextAlign::CENTER, footer_line);
                    } else if (show_contrast_feedback) {
                      draw_contrast_footer();
                    } else {
                      draw_footer_dividers();
                      it->printf(10, 50, id(medium_symbols), COLOR_ON, "\ue045");
                      if (playback == "PAUSED") {
                        it->printf(64, 58, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, "PAUSED");
                      } else if (playback == "PLAYING") {
                        it->printf(64, 58, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, "PLAYING");
                      } else if (playback == "IDLE") {
                        it->printf(64, 58, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, "IDLE");
                      } else {
                        it->printf(58, 51, id(symbols), COLOR_ON, "\ue1ac");
                      }
                      it->printf(104, 50, id(medium_symbols), COLOR_ON, "\ue044");
                    }
                  } else {
                    std::string automation_state = upper(id(selected_item_state));
                    std::string automation_feedback = upper(id(last_automation_feedback));
                    if (automation_state == "UNKNOWN" || automation_state == "") {
                      automation_state = "READY";
                    }
                    if (show_automation_feedback && !automation_feedback.empty()) {
                      snprintf(status_line, sizeof(status_line), "%s", automation_feedback.c_str());
                    } else {
                      snprintf(status_line, sizeof(status_line), "%s", automation_state.c_str());
                    }
                    it->print(64, 35, id(small_font), COLOR_ON, display::TextAlign::CENTER, status_line);

                    if (show_contrast_feedback) {
                      draw_contrast_footer();
                    } else {
                      draw_footer_dividers();
                      it->printf(10, 50, id(medium_symbols), COLOR_ON, "\ueac3");
                      it->printf(58, 51, id(symbols), COLOR_ON, "\ue1ac");
                      it->printf(104, 50, id(medium_symbols), COLOR_ON, "\ueac9");
                    }
                  }
                }
                it->display();
                id(updated_ui) = false;

  - id: reset_idle_timer
    mode: restart
    then:
      - lambda: |-
          id(last_active) = millis() / 1000;

interval:
  - interval: 500ms
    then:
      - if:
          condition:
            lambda: 'return (millis() / 1000) - id(last_active) >= ${SLEEP_DURATION};'
          then:
            - script.execute: turn_off
          else:
            - lambda: |-
                uint32_t now = millis();
                uint32_t elapsed = now - id(last_brightness_interaction);
                if (elapsed > 3000 && elapsed < 3500) {
                  id(updated_ui) = true;
                }
                uint32_t climate_elapsed = now - id(last_climate_interaction);
                if (id(last_climate_interaction) > 0 && climate_elapsed > 3000 && climate_elapsed < 3500) {
                  id(updated_ui) = true;
                }
                uint32_t climate_target_focus_elapsed = now - id(last_climate_target_focus_interaction);
                if (id(last_climate_target_focus_interaction) > 0 && climate_target_focus_elapsed > 5000 &&
                    climate_target_focus_elapsed < 5500) {
                  id(climate_target_focus) = 0;
                  id(climate_target_focus_value) = NAN;
                  id(last_climate_target_focus_interaction) = 0;
                  id(updated_ui) = true;
                }
                uint32_t media_elapsed = now - id(last_media_interaction);
                if (id(last_media_interaction) > 0 && media_elapsed > 3000 && media_elapsed < 3500) {
                  id(updated_ui) = true;
                }
                uint32_t automation_elapsed = now - id(last_automation_interaction);
                if (id(last_automation_interaction) > 0 && automation_elapsed > 5000 && automation_elapsed < 5500) {
                  id(updated_ui) = true;
                }
                uint32_t contrast_elapsed = now - id(last_contrast_interaction);
                if (id(last_contrast_interaction) > 0 && contrast_elapsed > 3000 && contrast_elapsed < 3500) {
                  id(updated_ui) = true;
                }
            - if:
                condition:
                  api.connected:
                    state_subscription_only: true
                then:
                  - if:
                      condition:
                        lambda: 'return id(show_boot_screen);'
                      then:
                        - lambda: |-
                            id(show_boot_screen) = false;
                            id(updated_ui) = true;
            - if:
                condition:
                  lambda: 'return id(show_boot_screen);'
                then:
                  - script.execute: boot_screen
                  - script.execute: sync_current_mode_status
                else:
                  - script.execute: sync_current_mode_status
                  - script.execute: update_display
