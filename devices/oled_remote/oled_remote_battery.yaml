substitutions:
  BOARD: "esp32dev"
  DEVICE_NAME: "esp32-remote"
  FRIENDLY_NAME: "ESP32 OLED Remote"
  VERSION: "1.0"
  SLEEP_DURATION: "120" # seconds until auto-sleep
  DEEP_SLEEP_DURATION: "360min"
  PIN_WAKE: "0"
  PIN_I2C_SDA: "27"
  PIN_I2C_SCL: "25"
  PIN_BTN_CONTRAST: "5"
  PIN_BTN_SWITCH: "14"
  PIN_BTN_POWER_SWITCH: "26"
  PIN_BTN_NEXT: "33"
  PIN_BTN_PREV: "22"
  PIN_BTN_DIMMER_UP: "23"
  PIN_BTN_DIMMER_UP_2: "17"
  PIN_BTN_DIMMER_DOWN: "19"
  PIN_BTN_DIMMER_DOWN_2: "18"
  PIN_OLED_EN: "15"
  PIN_BAT_ADC: "32"

api:
  homeassistant_states: true
  reboot_timeout: 0s
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

font:
  - file: "fonts/arial_bold.ttf"
    id: basic
    size: 13
    glyphs: [0123456789.ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz, "_", " ", ":", "%", "[", "]"]
  - file: "fonts/arial_bold.ttf"
    id: small
    size: 9
    glyphs: [0123456789.ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz, "_", " ", ":", "<", ">", "%", "[", "]"]
  - file: "fonts/arial_bold.ttf"
    id: big
    size: 15
    glyphs: [0123456789.ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz, "_", " ", ":"]
  - file:
      type: gfonts
      family: Material+Symbols+Rounded
      weight: 400
    id: symbols
    size: 16
    glyphs: [
      "\ue518", # lightbulb
      "\ue8ac", # power off
    ]

esphome:
  name: ${DEVICE_NAME}
  friendly_name: ${FRIENDLY_NAME}
  min_version: 2024.11.0
  name_add_mac_suffix: false
  includes:
    - light_entities.h
  on_boot:
    - priority: 700
      then:
        - output.turn_on: oled_power
        - delay: 10ms
    - priority: 400
      then:
        - script.execute: update_battery
    - priority: 250
      then:
        - lambda: |-
            ensure_light_status_tracker();
            id(last_active) = millis() / 1000;
            id(updated_ui) = true;
        - script.execute: update_selected_light
        - script.execute: sync_selected_light_status
        - script.execute: update_display

esp32:
  board: ${BOARD}
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 10dB
  fast_connect: true
  power_save_mode: LIGHT

logger:
  level: INFO # DEBUG

deep_sleep:
  id: go_sleep
  sleep_duration: ${DEEP_SLEEP_DURATION}
  wakeup_pin:
    number: ${PIN_WAKE}
    allow_other_uses: true
    ignore_strapping_warning: true
  wakeup_pin_mode: INVERT_WAKEUP

output:
  - platform: gpio
    pin: ${PIN_OLED_EN}
    id: oled_power

i2c:
  sda: ${PIN_I2C_SDA}
  scl: ${PIN_I2C_SCL}
  frequency: 400kHz
  scan: false

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    rotation: 180
    contrast: 0.5
    id: oled_display

globals:
  - id: contrast
    type: int
    initial_value: '5'
    restore_value: True

  - id: last_active
    type: int
    restore_value: no
    initial_value: '0'

  - id: last_battery_update
    type: uint32_t
    initial_value: '0'

  - id: updated_ui
    type: bool
    initial_value: 'true'

  - id: selected_light_index
    type: int
    initial_value: '0'
    restore_value: True

  - id: selected_light_name
    type: std::string
    initial_value: '"Living Room"'
    restore_value: True

  - id: selected_light_entity
    type: std::string
    initial_value: '"light.living_room"'
    restore_value: True

  - id: current_light_state
    type: std::string
    initial_value: '"unknown"'

  - id: selected_brightness_pct
    type: int
    initial_value: '0'

sensor:
  - platform: adc
    pin: ${PIN_BAT_ADC}
    id: battery_adc
    attenuation: 11db
    update_interval: never
    filters:
      - multiply: 1.68

  - platform: template
    id: battery_voltage
    name: "Battery Voltage"
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    update_interval: never
    lambda: |-
      if (!id(battery_adc).has_state()) {
        return NAN;
      }
      return id(battery_adc).state;

  - platform: template
    id: battery_percent
    name: "Battery"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    state_class: measurement
    update_interval: never
    lambda: |-
      if (!id(battery_adc).has_state()) {
        return NAN;
      }

      float v = id(battery_adc).state;
      static float v_avg = 0;

      const float V_MIN = 3.30;
      const float V_MAX = 4.20;
      const float GAMMA = 2.2;

      if (isnan(v) || v < 2.5 || v > 4.5) {
        return NAN;
      }

      v_avg = (v_avg == 0) ? v : (v_avg * 0.8f + v * 0.2f);
      v = v_avg;

      if (v <= V_MIN) return 0;
      if (v >= V_MAX) return 100;

      float x = (v - V_MIN) / (V_MAX - V_MIN);
      float pct = powf(x, GAMMA) * 100.0f;

      return (int)roundf(pct);

binary_sensor:
  - platform: gpio
    pin:
      allow_other_uses: true
      number: ${PIN_WAKE}
      ignore_strapping_warning: true
      mode:
        input: True
        pullup: True
    name: "Remote Power Button"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: turn_off

  - platform: gpio
    pin:
      number: ${PIN_BTN_PREV}
      mode:
        input: True
        pullup: True
    name: "Previous Light Entity"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: select_previous_light

  - platform: gpio
    pin:
      number: ${PIN_BTN_CONTRAST}
      mode:
        input: True
        pullup: True
    name: "OLED Contrast"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - lambda: |-
            id(contrast) += 1;
            if (id(contrast) > 10) id(contrast) = 1;
            float contrast_value = id(contrast) * 1.0 / 10;
            ESP_LOGD("display", "Contrast = %f", contrast_value);
            id(oled_display).set_contrast(contrast_value);
            id(updated_ui) = true;
        - script.execute: update_display

  - platform: gpio
    pin:
      number: ${PIN_BTN_NEXT}
      mode:
        input: True
        pullup: True
    name: "Next Light Entity"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: select_next_light

  - platform: gpio
    pin:
      number: ${PIN_BTN_SWITCH}
      mode:
        input: True
        pullup: True
    name: "No Function"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer

  - platform: gpio
    pin:
      number: ${PIN_BTN_POWER_SWITCH}
      mode:
        input: True
        pullup: True
    name: "Light Power Switch"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: toggle_selected_light

  - platform: gpio
    pin:
      number: ${PIN_BTN_DIMMER_UP}
      mode:
        input: True
        pullup: True
    name: "Light Brightness Up"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: increase_brightness

  - platform: gpio
    pin:
      number: ${PIN_BTN_DIMMER_UP_2}
      mode:
        input: True
        pullup: True
    name: "Light Brightness Up 2"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: increase_brightness

  - platform: gpio
    pin:
      number: ${PIN_BTN_DIMMER_DOWN}
      mode:
        input: True
        pullup: True
    name: "Light Brightness Down"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: decrease_brightness

  - platform: gpio
    pin:
      number: ${PIN_BTN_DIMMER_DOWN_2}
      mode:
        input: True
        pullup: True
    name: "Light Brightness Down 2"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: decrease_brightness       

script:
  - id: turn_off
    mode: single
    then:
      - lambda: |-
          auto it = id(oled_display);
          it->clear();
          it->print(64, 24, id(symbols), COLOR_ON, display::TextAlign::CENTER, "\ue8ac");
          it->print(64, 48, id(small), COLOR_ON, display::TextAlign::CENTER, "POWER OFF");
          it->display();
      - delay: 1s
      - lambda: |-
          auto it = id(oled_display);
          it->clear();
          it->display();
      - delay: 500ms
      - output.turn_off: oled_power
      - delay: 5ms
      - deep_sleep.enter: go_sleep

  - id: update_battery
    mode: single
    then:
      - component.update: battery_adc
      - delay: 50ms
      - component.update: battery_voltage
      - component.update: battery_percent
      - lambda: |-
          id(last_battery_update) = millis();
          id(updated_ui) = true;

  - id: update_selected_light
    then:
      - lambda: |-
          int idx = id(selected_light_index);
          if (idx < 0) {
            idx = 0;
          }
          if (idx >= LIGHT_LIST_COUNT) {
            idx = 0;
            id(selected_light_index) = 0;
          }
          id(selected_light_name) = LIGHT_LIST[idx].name;
          id(selected_light_entity) = LIGHT_LIST[idx].entity_id;
          id(current_light_state) = "unknown";
          id(selected_brightness_pct) = 0;
          id(updated_ui) = true;
          request_selected_light_status(idx);
      - script.execute: sync_selected_light_status
      - script.execute: update_display

  - id: sync_selected_light_status
    then:
      - lambda: |-
          int idx = id(selected_light_index);
          std::string state = selected_light_state(idx);
          float brightness = selected_light_brightness(idx);

          if (state == "on") {
            id(current_light_state) = "on";
            if (selected_light_has_brightness(idx) && !isnan(brightness) && brightness > 0) {
              int pct = (int) roundf((brightness / 255.0f) * 100.0f);
              if (pct < 1) pct = 1;
              if (pct > 100) pct = 100;
              id(selected_brightness_pct) = pct;
            } else if (id(selected_brightness_pct) <= 0) {
              id(selected_brightness_pct) = 100;
            }
            id(updated_ui) = true;
          } else if (state == "off") {
            id(current_light_state) = "off";
            id(selected_brightness_pct) = 0;
            id(updated_ui) = true;
          } else {
            id(current_light_state) = "unknown";
            id(updated_ui) = true;
            request_selected_light_status(idx);
          }

  - id: select_next_light
    then:
      - lambda: |-
          id(selected_light_index)++;
          if (id(selected_light_index) >= LIGHT_LIST_COUNT) {
            id(selected_light_index) = 0;
          }
      - script.execute: update_selected_light

  - id: select_previous_light
    then:
      - lambda: |-
          id(selected_light_index)--;
          if (id(selected_light_index) < 0) {
            id(selected_light_index) = LIGHT_LIST_COUNT - 1;
          }
      - script.execute: update_selected_light

  - id: toggle_selected_light
    mode: queued
    then:
      - if:
          condition:
            lambda: 'return id(current_light_state) == "on";'
          then:
            - homeassistant.service:
                service: light.turn_off
                data:
                  entity_id: !lambda 'return id(selected_light_entity);'
            - lambda: |-
                id(current_light_state) = "off";
                id(updated_ui) = true;
            - script.execute: update_display
          else:
            - homeassistant.service:
                service: light.turn_on
                data:
                  entity_id: !lambda 'return id(selected_light_entity);'
                  brightness_pct: !lambda |-
                    if (id(selected_brightness_pct) <= 0) {
                      return 100;
                    }
                    return id(selected_brightness_pct);
            - lambda: |-
                id(current_light_state) = "on";
                if (id(selected_brightness_pct) <= 0) {
                  id(selected_brightness_pct) = 100;
                }
                id(updated_ui) = true;
            - script.execute: update_display

  - id: increase_brightness
    mode: queued
    then:
      - lambda: |-
          int next = id(selected_brightness_pct) + 10;
          if (next > 100) next = 100;
          if (next < 10) next = 10;
          id(selected_brightness_pct) = next;
          id(current_light_state) = "on";
          id(updated_ui) = true;
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: !lambda 'return id(selected_light_entity);'
            brightness_pct: !lambda 'return id(selected_brightness_pct);'
      - script.execute: update_display

  - id: decrease_brightness
    mode: queued
    then:
      - if:
          condition:
            lambda: 'return id(selected_brightness_pct) <= 10;'
          then:
            - homeassistant.service:
                service: light.turn_off
                data:
                  entity_id: !lambda 'return id(selected_light_entity);'
            - lambda: |-
                id(selected_brightness_pct) = 0;
                id(current_light_state) = "off";
                id(updated_ui) = true;
            - script.execute: update_display
          else:
            - lambda: |-
                int next = id(selected_brightness_pct) - 10;
                if (next < 1) next = 1;
                id(selected_brightness_pct) = next;
                id(current_light_state) = "on";
                id(updated_ui) = true;
            - homeassistant.service:
                service: light.turn_on
                data:
                  entity_id: !lambda 'return id(selected_light_entity);'
                  brightness_pct: !lambda 'return id(selected_brightness_pct);'
            - script.execute: update_display

  - id: update_display
    then:
      - if:
          condition:
            lambda: 'return id(updated_ui) == true;'
          then:
            - lambda: |-
                auto it = id(oled_display);
                char status_line[64];
                char battery_line[64];

                it->clear();
                it->print(64, 6, id(symbols), COLOR_ON, display::TextAlign::CENTER, "\ue518");
                it->print(64, 22, id(small), COLOR_ON, display::TextAlign::CENTER, "SELECTED LIGHT");
                it->print(64, 34, id(basic), COLOR_ON, display::TextAlign::CENTER, id(selected_light_name).c_str());

                if (id(current_light_state) == "on") {
                  snprintf(status_line, sizeof(status_line), "ON %d%%", id(selected_brightness_pct));
                } else if (id(current_light_state) == "off") {
                  snprintf(status_line, sizeof(status_line), "OFF");
                } else {
                  snprintf(status_line, sizeof(status_line), "UNKNOWN");
                }
                it->print(64, 48, id(basic), COLOR_ON, display::TextAlign::CENTER, status_line);

                if (id(battery_percent).has_state()) {
                  snprintf(battery_line, sizeof(battery_line), "BATTERY %.0f%%", id(battery_percent).state);
                  it->print(64, 59, id(small), COLOR_ON, display::TextAlign::CENTER, battery_line);
                }

                it->display();
                id(updated_ui) = false;

  - id: reset_idle_timer
    mode: restart
    then:
      - lambda: |-
          id(last_active) = millis() / 1000;

interval:
  - interval: 500ms
    then:
      - if:
          condition:
            lambda: 'return (millis() / 1000) - id(last_active) >= ${SLEEP_DURATION};'
          then:
            - script.execute: turn_off
          else:
            - script.execute: sync_selected_light_status
            - if:
                condition:
                  lambda: 'return millis() - id(last_battery_update) >= 300000;'
                then:
                  - script.execute: update_battery
            - script.execute: update_display
