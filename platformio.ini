; Root PlatformIO wrapper. This repository's buildable PlatformIO project is
; generated by ESPHome under esphome/.esphome/build/<device>/ and pins its own
; platform/frameworks, so this env cannot compile the firmware directly.
; Instead, the default build target delegates to `esphome compile` (see
; tools/pio_esphome_bridge.py). Equivalent terminal commands:
;   esphome compile esphome/remote_control.yaml
;   esphome run esphome/remote_control.yaml

[env:esp32dev]
platform = native
targets = esphome
extra_scripts = tools/pio_esphome_bridge.py
monitor_speed = 115200
