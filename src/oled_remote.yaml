      - lambda: |-
          bool same_mode = id(play_pause_button_press_mode) == id(current_mode);
          bool still_pressed = id(play_pause_mode_button).state;
          bool already_fired = id(play_pause_button_long_press_fired);

          if (id(play_pause_button_press_started_at) == 0 || !same_mode || !still_pressed || already_fired) {
            return;
          }

          id(play_pause_button_long_press_fired) = true;
          id(play_pause_mode_action).execute();

