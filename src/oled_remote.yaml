      "\uf165", # humidity_mid
      "\uf168", # fan_mode
      "\ue286", # blinds
      "\ue897", # lock 
      "\uf4f2", # media_output
      "\uf556", # sensors
      "\ue88a", # home
      "\ue7f7", # notifications_active
      "\ue158", # mail
