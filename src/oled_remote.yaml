binary_sensor:
  - platform: gpio
    pin:
      allow_other_uses: true
      number: ${PIN_WAKE}
      ignore_strapping_warning: true
      mode:
        input: True
        pullup: True
    name: "Remote Power Button"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: turn_off

  - platform: gpio
    pin:
      number: ${PIN_BTN_PREV}
      mode:
        input: True
        pullup: True
    name: "Previous Mode Item"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: previous_button_action

  - platform: gpio
    pin:
      number: ${PIN_BTN_CONTRAST}
      mode:
        input: True
        pullup: True
    name: "OLED Contrast"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - if:
            condition:
              lambda: 'return id(current_mode) == REMOTE_MODE_MEDIA;'
            then:
              - if:
                  condition:
                    lambda: 'return id(selected_media_device_class) == "speaker";'
                  then:
                    - script.execute: media_play_stop
                  else:
                    - script.execute: media_toggle_power
            else:
              - lambda: |-
                  id(contrast) += 1;
                  if (id(contrast) > 10) id(contrast) = 1;
                  float contrast_value = id(contrast) * 1.0 / 10;
                  ESP_LOGD("display", "Contrast = %f", contrast_value);
                  id(oled_display).set_contrast(contrast_value);
                  id(last_contrast_interaction) = millis();
                  id(updated_ui) = true;
              - script.execute: persist_ui_state
              - script.execute: update_display

  - platform: gpio
    pin:
      number: ${PIN_BTN_NEXT}
      mode:
        input: True
        pullup: True
    name: "Next Mode Item"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: next_button_action

  - platform: gpio
    pin:
      number: ${PIN_BTN_MODE}
      mode:
        input: True
        pullup: True
    name: "Cycle Remote Mode"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: cycle_mode

  - platform: gpio
    pin:
      number: ${PIN_BTN_SETTINGS}
      mode:
        input: True
        pullup: True
    name: "Secondary Mode Action"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: secondary_mode_action

  - platform: gpio
    id: primary_mode_button
    pin:
      number: ${PIN_BTN_CIRCLE}
      mode:
        input: True
        pullup: True
    name: "Primary Mode Action"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: handle_primary_button_press
    on_release:
      then:
        - script.execute: handle_primary_button_release

  - platform: gpio
    id: play_pause_mode_button
    pin:
      number: ${PIN_BTN_PLAY_PAUSE}
      mode:
        input: True
        pullup: True
    name: "Play Pause Mode Action"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: handle_play_pause_button_press
    on_release:
      then:
        - script.execute: handle_play_pause_button_release

  - platform: gpio
    pin:
      number: ${PIN_BTN_DIMMER_UP}
      mode:
        input: True
        pullup: True
    name: "Increase Mode Value"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: increase_mode_value

  - platform: gpio
    pin:
      number: ${PIN_BTN_DIMMER_DOWN}
      mode:
        input: True
        pullup: True
    name: "Decrease Mode Value"
    internal: True
    filters:
      - invert:
    on_press:
      then:
        - script.execute: reset_idle_timer
        - script.execute: decrease_mode_value

script:
  - id: show_powering_off_screen
    mode: single
    then:
      - lambda: |-
          auto it = id(oled_display);
          it->clear();
          it->print(64, 24, id(medium_symbols), COLOR_ON, display::TextAlign::CENTER, "\ue8ac");
          it->print(64, 48, id(small_font), COLOR_ON, display::TextAlign::CENTER, "POWERING OFF");
          it->display();

  - id: clear_display_for_sleep
    mode: single
    then:
      - lambda: |-
          auto it = id(oled_display);
          it->clear();
          it->display();

  - id: reset_mode_feedback_timers
    then:
      - lambda: |-
          id(last_brightness_interaction) = 0;
          id(last_switch_interaction) = 0;
          id(last_fan_speed_interaction) = 0;
          id(last_humidifier_interaction) = 0;
          id(last_humidifier_mode_interaction) = 0;
          id(last_climate_interaction) = 0;
          id(last_lock_interaction) = 0;
          id(last_cover_interaction) = 0;
          id(last_cover_position_interaction) = 0;
          id(last_media_interaction) = 0;
          id(last_media_volume_interaction) = 0;
          id(last_media_source_interaction) = 0;
          id(last_media_power_interaction) = 0;
          id(last_automation_interaction) = 0;

  - id: reset_selected_item_state
    then:
      - lambda: |-
          id(selected_item_state) = "unknown";
          id(selected_brightness_pct) = 0;
          id(selected_fan_speed_pct) = 0;
          id(selected_humidifier_target_humidity) = NAN;
          id(selected_humidifier_current_humidity) = NAN;
          id(selected_humidifier_action) = "unknown";
          id(selected_humidifier_mode) = "";
          id(selected_cover_position_pct) = 0;
          id(last_switch_feedback) = "";
          id(last_switch_interaction) = 0;
          id(selected_climate_target_temp) = NAN;
          id(selected_climate_hvac_action) = "unknown";
          id(selected_climate_preset) = "";
          id(selected_climate_target_temp_low) = NAN;
          id(selected_climate_target_temp_high) = NAN;
          id(selected_climate_current_temp) = NAN;
          id(climate_target_focus) = 0;
          id(climate_target_focus_value) = NAN;
          id(last_climate_target_focus_interaction) = 0;
          id(selected_media_title) = "";
          id(selected_media_artist) = "";
          id(selected_media_device_class) = "";
          id(selected_media_source) = "";
          id(last_media_power_feedback) = "";
          id(selected_automation_state) = "unknown";
          id(last_lock_feedback) = "";
          id(last_lock_interaction) = 0;
          id(last_cover_feedback) = "";
          id(last_cover_interaction) = 0;
          id(last_cover_position_interaction) = 0;
          id(selected_weather_temperature) = NAN;
          id(selected_weather_humidity) = NAN;
          id(selected_weather_high_temp) = NAN;
          id(selected_weather_low_temp) = NAN;
          id(selected_weather_condition) = "unknown";
          id(updated_ui) = true;

  - id: persist_ui_state
    then:
      - lambda: |-
          constexpr uint64_t UI_STATE_FORMAT_V5 = (1ULL << 63) | (1ULL << 62) | (1ULL << 61) | (1ULL << 60);
          id(persisted_ui_state) =
              UI_STATE_FORMAT_V5 |
              (uint64_t(id(selected_time_index) & 0x1F) << 56) |
              (uint64_t(id(selected_weather_index) & 0x3F) << 50) |
              (uint64_t(id(selected_automation_index) & 0x3F) << 44) |
              (uint64_t(id(selected_media_index) & 0x3F) << 38) |
              (uint64_t(id(selected_cover_index) & 0x3F) << 32) |
              (uint64_t(id(selected_lock_index) & 0x3F) << 26) |
              (uint64_t(id(selected_climate_index) & 0x3F) << 20) |
              (uint64_t(id(selected_switch_index) & 0x3F) << 14) |
              (uint64_t(id(selected_light_index) & 0x3F) << 8) |
              (uint64_t(id(current_mode) & 0x0F) << 4) |
              uint64_t(id(contrast) & 0x0F);
          id(persisted_ui_state_aux) =
              (uint32_t(id(selected_humidifier_index) & 0x3F) << 6) |
              uint32_t(id(selected_fan_index) & 0x3F);

  - id: update_selected_item
    then:
      - lambda: |-
          RemoteMode mode = static_cast<RemoteMode>(id(current_mode));
          if (!mode_is_available(mode)) {
            mode = first_available_mode();
            id(current_mode) = mode;
          }
          int count = mode_item_count(mode);

          if (count <= 0) {
            id(selected_item_name) = "NO ITEMS";
            id(selected_item_entity) = "";
            id(selected_item_state) = "unknown";
            id(updated_ui) = true;
            return;
          }

          int &selected_index = selected_index_ref(
              mode, id(selected_light_index), id(selected_switch_index), id(selected_climate_index), id(selected_lock_index), id(selected_cover_index),
              id(selected_media_index), id(selected_automation_index), id(selected_weather_index), id(selected_time_index), id(selected_fan_index), id(selected_humidifier_index));
          selected_index = clamp_mode_index(selected_index, count);
          int idx = selected_index;

          id(selected_item_name) = mode_item_name(mode, idx);
          id(selected_item_entity) = mode_item_entity(mode, idx);
      - script.execute: reset_selected_item_state
      - lambda: |-
          RemoteMode mode = static_cast<RemoteMode>(id(current_mode));
          int idx = selected_index_ref(
              mode, id(selected_light_index), id(selected_switch_index), id(selected_climate_index), id(selected_lock_index), id(selected_cover_index),
              id(selected_media_index), id(selected_automation_index), id(selected_weather_index), id(selected_time_index), id(selected_fan_index), id(selected_humidifier_index));
          idx = clamp_mode_index(idx, mode_item_count(mode));
          if (mode == REMOTE_MODE_MEDIA) {
            const std::string &state = selected_media_state(idx);
            const std::string &device_class = media_device_class_for_index(idx);
            const std::string &title = media_title_for_index(idx);
            const std::string &artist = media_artist_for_index(idx);
            const std::string &source = media_source_for_index(idx);
            float volume = selected_media_volume(idx);

            if (state != "unknown") {
              id(selected_item_state) = state;
            }
            id(selected_media_device_class) = device_class;
            id(selected_media_title) = title;
            id(selected_media_artist) = artist;
            if ((device_class == "tv" || device_class == "receiver")) {
              if (!source.empty()) {
                id(selected_media_source) = source;
              }
            } else {
              id(selected_media_source) = source;
            }
            if (!isnan(volume)) {
              int pct = (int) roundf(volume * 100.0f);
              if (pct < 0) pct = 0;
              if (pct > 100) pct = 100;
              id(selected_media_volume_pct) = pct;
            }
          }
          request_mode_status_throttled(mode, idx, millis(), 2500, true);
      - script.execute: persist_ui_state
      - script.execute: sync_current_mode_status
      - script.execute: update_display

  - id: boot_screen
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - lambda: |-
                auto it = id(oled_display);
                it->clear();
                it->print(64, 8, id(medium_symbols), COLOR_ON, display::TextAlign::CENTER, "\ue63e");
                it->print(64, 24, id(small_font), COLOR_ON, display::TextAlign::CENTER, "WIFI CONNECTED");
                it->print(64, 36, id(small_font), COLOR_ON, display::TextAlign::CENTER, "CONNECTING TO API");
                it->display();
          else:
            - lambda: |-
                auto it = id(oled_display);
                it->clear();
                it->print(64, 8, id(medium_symbols), COLOR_ON, display::TextAlign::CENTER, "\ue648");
                it->print(64, 24, id(small_font), COLOR_ON, display::TextAlign::CENTER, "CONNECTING TO WIFI");
                it->print(64, 36, id(small_font), COLOR_ON, display::TextAlign::CENTER, "WAITING FOR NETWORK");
                it->print(64, 56, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, "V${VERSION}");
                it->display();

  - id: show_low_battery_popup
    mode: restart
    then:
      - lambda: |-
          id(low_battery_popup_active) = true;
          id(low_battery_popup_shown) = true;
          id(show_boot_screen) = false;
          id(updated_ui) = true;

          auto it = id(oled_display);
          it->clear();
          it->print(64, 8, id(medium_symbols), COLOR_ON, display::TextAlign::CENTER, "\ue19c");
          it->print(64, 26, id(small_font), COLOR_ON, display::TextAlign::CENTER, "LOW BATTERY");
          it->print(64, 38, id(small_font), COLOR_ON, display::TextAlign::CENTER, "PLEASE CHARGE");
          if (!isnan(id(battery_voltage))) {
            it->printf(64, 56, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, "%.02fV", id(battery_voltage));
          }
          it->display();
      - delay: 10s
      - lambda: |-
          id(low_battery_popup_active) = false;
          id(updated_ui) = true;

  - id: api_disconnected_screen
    then:
      - lambda: |-
          auto it = id(oled_display);
          it->clear();
          it->print(64, 8, id(medium_symbols), COLOR_ON, display::TextAlign::CENTER, "\ue63e");
          it->print(64, 24, id(small_font), COLOR_ON, display::TextAlign::CENTER, "WIFI CONNECTED");
          it->print(64, 36, id(small_font), COLOR_ON, display::TextAlign::CENTER, "API DISCONNECTED");
          it->print(64, 56, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, "RECONNECTING...");
          it->display();

  - id: wifi_disconnected_screen
    then:
      - lambda: |-
          auto it = id(oled_display);
          it->clear();
          it->print(64, 8, id(medium_symbols), COLOR_ON, display::TextAlign::CENTER, "\ue648");
          it->print(64, 24, id(small_font), COLOR_ON, display::TextAlign::CENTER, "WIFI DISCONNECTED");
          it->print(64, 36, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, "RECONNECTING...");
          it->display();

  - id: cycle_mode
    then:
      - lambda: |-
          RemoteMode current = static_cast<RemoteMode>(id(current_mode));
          id(current_mode) = next_available_mode(current, 1);
          id(updated_ui) = true;
      - script.execute: reset_mode_feedback_timers
      - script.execute: update_selected_item

  - id: sync_current_mode_status
    then:
      - lambda: |-
          RemoteMode mode = static_cast<RemoteMode>(id(current_mode));
          int idx = selected_index_ref(
              mode, id(selected_light_index), id(selected_switch_index), id(selected_climate_index), id(selected_lock_index), id(selected_cover_index),
              id(selected_media_index), id(selected_automation_index), id(selected_weather_index), id(selected_time_index), id(selected_fan_index), id(selected_humidifier_index));
          idx = clamp_mode_index(idx, mode_item_count(mode));

          if (mode == REMOTE_MODE_LIGHTS) {
            const std::string &state = selected_light_state(idx);
            float brightness = selected_light_brightness(idx);
            std::string next_state = id(selected_item_state);
            int next_brightness_pct = id(selected_brightness_pct);

            if (state == "on") {
              next_state = "on";
              if (selected_light_has_brightness(idx) && !isnan(brightness) && brightness > 0) {
                int pct = (int) roundf((brightness / 255.0f) * 100.0f);
                if (pct < 1) pct = 1;
                if (pct > 100) pct = 100;
                next_brightness_pct = pct;
              } else if (next_brightness_pct <= 0) {
                next_brightness_pct = 100;
              }
            } else if (state == "off") {
              next_state = "off";
              next_brightness_pct = 0;
            } else {
              next_state = "unknown";
              request_mode_status_throttled(mode, idx, millis(), 2500);
            }

            if (next_state != id(selected_item_state) || next_brightness_pct != id(selected_brightness_pct)) {
              id(selected_item_state) = next_state;
              id(selected_brightness_pct) = next_brightness_pct;
              id(updated_ui) = true;
            }
          } else if (mode == REMOTE_MODE_FANS) {
            const std::string &state = selected_fan_state(idx);
            float percentage = selected_fan_percentage(idx);
            bool has_percentage = selected_fan_has_percentage(idx);
            std::string next_state = id(selected_item_state);
            int next_speed_pct = id(selected_fan_speed_pct);

            if (state == "on") {
              next_state = "on";
              if (has_percentage && !isnan(percentage) && percentage > 0) {
                int pct = (int) roundf(percentage);
                if (pct < 1) pct = 1;
                if (pct > 100) pct = 100;
                next_speed_pct = pct;
              } else if (!has_percentage) {
                next_speed_pct = 0;
              }
            } else if (state == "off") {
              next_state = "off";
              next_speed_pct = 0;
            } else {
              next_state = "unknown";
              request_mode_status_throttled(mode, idx, millis(), 2500);
            }

            if (next_state != id(selected_item_state) || next_speed_pct != id(selected_fan_speed_pct)) {
              id(selected_item_state) = next_state;
              id(selected_fan_speed_pct) = next_speed_pct;
              id(updated_ui) = true;
            }
          } else if (mode == REMOTE_MODE_HUMIDIFIERS) {
            const std::string &state = selected_humidifier_state(idx);
            const std::string &mode_value = humidifier_mode_for_index(idx);
            const std::string &action = humidifier_action_for_index(idx);
            float target = humidifier_target_humidity_for_index(idx);
            float current = humidifier_current_humidity_for_index(idx);
            bool changed = false;

            if (state == "unknown" && std::isnan(target) && std::isnan(current)) {
              request_mode_status_throttled(mode, idx, millis(), 2500);
            } else {
              if (id(selected_item_state) != state) {
                id(selected_item_state) = state;
                changed = true;
              }
              if (id(selected_humidifier_action) != action) {
                id(selected_humidifier_action) = action;
                changed = true;
              }
              if (id(selected_humidifier_mode) != mode_value) {
                id(selected_humidifier_mode) = mode_value;
                changed = true;
              }
              if (!isnan(target) && id(selected_humidifier_target_humidity) != target) {
                id(selected_humidifier_target_humidity) = target;
                changed = true;
              }
              if (!isnan(current) && id(selected_humidifier_current_humidity) != current) {
                id(selected_humidifier_current_humidity) = current;
                changed = true;
              }
              if (changed) {
                id(updated_ui) = true;
              }
            }
          } else if (mode == REMOTE_MODE_SWITCHES) {
            const std::string &state = selected_switch_state(idx);

            if (state == "unknown") {
              request_mode_status_throttled(mode, idx, millis(), 2500);
            } else if (id(selected_item_state) != state) {
              id(selected_item_state) = state;
              id(updated_ui) = true;
            }
          } else if (mode == REMOTE_MODE_CLIMATE) {
            const std::string &state = selected_climate_state(idx);
            const std::string &hvac_action = climate_hvac_action_for_index(idx);
            const std::string &preset = selected_climate_preset_mode(idx);
            float target = selected_climate_target_temperature(idx);
            float target_low = selected_climate_target_temperature_low(idx);
            float target_high = selected_climate_target_temperature_high(idx);
            float current = selected_climate_current_temperature(idx);
            bool changed = false;

            if (state == "unknown") {
              request_mode_status_throttled(mode, idx, millis(), 2500);
            } else {
              if (id(selected_item_state) != state) {
                id(selected_item_state) = state;
                changed = true;
              }
              if (state != "off") {
                id(last_climate_mode) = state;
              }
              if (!hvac_action.empty() && id(selected_climate_hvac_action) != hvac_action) {
                id(selected_climate_hvac_action) = hvac_action;
                changed = true;
              }
              if (!isnan(target) && id(selected_climate_target_temp) != target) {
                id(selected_climate_target_temp) = target;
                changed = true;
              }
              if (!isnan(target_low) && id(selected_climate_target_temp_low) != target_low) {
                id(selected_climate_target_temp_low) = target_low;
                changed = true;
              }
              if (!isnan(target_high) && id(selected_climate_target_temp_high) != target_high) {
                id(selected_climate_target_temp_high) = target_high;
                changed = true;
              }
              if (!isnan(current) && id(selected_climate_current_temp) != current) {
                id(selected_climate_current_temp) = current;
                changed = true;
              }
              if (id(selected_climate_preset) != preset) {
                id(selected_climate_preset) = preset;
                changed = true;
              }
              if (changed) {
                id(updated_ui) = true;
              }
            }
          } else if (mode == REMOTE_MODE_LOCKS) {
            const std::string &state = selected_lock_state(idx);

            if (state == "unknown") {
              request_mode_status_throttled(mode, idx, millis(), 2500);
            } else if (id(selected_item_state) != state) {
              id(selected_item_state) = state;
              id(updated_ui) = true;
            }
          } else if (mode == REMOTE_MODE_SHADES) {
            const std::string &state = selected_cover_state(idx);
            float position = selected_cover_position(idx);
            bool changed = false;

            if (state == "unknown" && std::isnan(position)) {
              request_mode_status_throttled(mode, idx, millis(), 2500);
            } else {
              if (state != "unknown" && id(selected_item_state) != state) {
                id(selected_item_state) = state;
                changed = true;
              }
              if (!std::isnan(position)) {
                int pct = (int) roundf(position);
                if (pct < 0) pct = 0;
                if (pct > 100) pct = 100;
                if (id(selected_cover_position_pct) != pct) {
                  id(selected_cover_position_pct) = pct;
                  changed = true;
                }
              }
              if (changed) {
                id(updated_ui) = true;
              }
            }
          } else if (mode == REMOTE_MODE_MEDIA) {
            const std::string &state = selected_media_state(idx);
            const std::string &device_class = media_device_class_for_index(idx);
            const std::string &title = media_title_for_index(idx);
            const std::string &artist = media_artist_for_index(idx);
            const std::string &source = media_source_for_index(idx);
            float volume = selected_media_volume(idx);
            bool changed = false;

            if (state == "unknown") {
              request_mode_status_throttled(mode, idx, millis(), 2500);
            } else {
              if (id(selected_item_state) != state) {
                id(selected_item_state) = state;
                changed = true;
              }
              if (id(selected_media_title) != title) {
                id(selected_media_title) = title;
                changed = true;
              }
              if (id(selected_media_artist) != artist) {
                id(selected_media_artist) = artist;
                changed = true;
              }
              if (id(selected_media_device_class) != device_class) {
                id(selected_media_device_class) = device_class;
                changed = true;
              }
              if (device_class == "tv" || device_class == "receiver") {
                if (!source.empty() && id(selected_media_source) != source) {
                  id(selected_media_source) = source;
                  changed = true;
                }
              } else if (id(selected_media_source) != source) {
                id(selected_media_source) = source;
                changed = true;
              }
              if (!isnan(volume)) {
                int pct = (int) roundf(volume * 100.0f);
                if (pct < 0) pct = 0;
                if (pct > 100) pct = 100;
                if (id(selected_media_volume_pct) != pct) {
                  id(selected_media_volume_pct) = pct;
                  changed = true;
                }
              }
              if (changed) {
                id(updated_ui) = true;
              }
            }
          } else if (mode == REMOTE_MODE_SENSORS) {
            const std::string &state = sensor_state_for_index(idx);
            if (state == "unknown") {
              request_mode_status_throttled(mode, idx, millis(), 2500);
            } else if (id(selected_item_state) != state) {
              id(selected_item_state) = state;
              id(updated_ui) = true;
            }
          } else if (mode == REMOTE_MODE_AUTOMATION) {
            const std::string &state = automation_state_for_index(idx);
            std::string next_state = automation_supports_enabled_state(idx) ? state : "ready";
            bool changed = false;

            if (automation_supports_enabled_state(idx)) {
              if (id(selected_automation_state) != next_state) {
                id(selected_automation_state) = next_state;
                changed = true;
              }
            } else if (id(selected_automation_state) != "ready") {
              id(selected_automation_state) = "ready";
              changed = true;
            }
            if (id(selected_item_state) != next_state) {
              id(selected_item_state) = next_state;
              changed = true;
            }
            if (state == "unknown") {
              request_mode_status_throttled(mode, idx, millis(), 2500);
            }
            if (changed) {
              id(updated_ui) = true;
            }
          } else if (mode == REMOTE_MODE_ALARMS) {
            const std::string &state = alarm_state_for_index(idx);
            if (state == "unknown") {
              request_mode_status_throttled(mode, idx, millis(), 2500);
            } else if (id(selected_item_state) != state) {
              id(selected_item_state) = state;
              id(updated_ui) = true;
            }
          } else if (mode == REMOTE_MODE_NOTIFICATIONS) {
            int count = notification_mode_item_count();
            int clamped_idx = clamp_mode_index(idx, count);
            std::string next_name = notification_mode_item_name(clamped_idx);
            std::string next_entity = notification_mode_item_entity(clamped_idx);
            std::string next_message = notification_message_for_index(clamped_idx);

            if (clamped_idx != id(selected_time_index)) {
              id(selected_time_index) = clamped_idx;
              idx = clamped_idx;
              id(updated_ui) = true;
            }
            if (id(selected_item_name) != next_name) {
              id(selected_item_name) = next_name;
              id(updated_ui) = true;
            }
            if (id(selected_item_entity) != next_entity) {
              id(selected_item_entity) = next_entity;
              id(updated_ui) = true;
            }
            if (id(selected_item_state) != next_message) {
              id(selected_item_state) = next_message;
              id(updated_ui) = true;
            }
            if (next_entity.empty() || (count > 1 && next_message.empty())) {
              request_mode_status_throttled(mode, clamped_idx, millis(), 2500);
            }
          } else if (mode == REMOTE_MODE_WEATHER) {
            const std::string &condition = weather_state_for_index(idx);
            float temperature = weather_temperature_for_index(idx);
            float humidity = weather_humidity_for_index(idx);
            float high = weather_high_temperature_for_index(idx);
            float low = weather_low_temperature_for_index(idx);
            bool changed = false;

            if (condition == "unknown" && std::isnan(temperature) && std::isnan(humidity) &&
                std::isnan(high) && std::isnan(low)) {
              request_mode_status_throttled(mode, idx, millis(), 2500);
            } else {
              if (id(selected_item_state) != condition) {
                id(selected_item_state) = condition;
                changed = true;
              }
              if (id(selected_weather_condition) != condition) {
                id(selected_weather_condition) = condition;
                changed = true;
              }
              if (id(selected_weather_temperature) != temperature) {
                id(selected_weather_temperature) = temperature;
                changed = true;
              }
              if (id(selected_weather_humidity) != humidity) {
                id(selected_weather_humidity) = humidity;
                changed = true;
              }
              if (id(selected_weather_high_temp) != high) {
                id(selected_weather_high_temp) = high;
                changed = true;
              }
              if (id(selected_weather_low_temp) != low) {
                id(selected_weather_low_temp) = low;
                changed = true;
              }
              if (changed) {
                id(updated_ui) = true;
              }
            }
          } else if (mode == REMOTE_MODE_INFO) {
            const char *state =
                idx == 0 ? "date" :
                idx == 1 ? "network" :
                "version";
            if (id(selected_item_state) != state) {
              id(selected_item_state) = state;
              id(updated_ui) = true;
            }
          }

  - id: dispatch_mode_action
    parameters:
      action: int
    then:
      - lambda: |-
          const int MODE_ACTION_PRIMARY = 0;
          const int MODE_ACTION_SECONDARY = 1;
          const int MODE_ACTION_PLAY_PAUSE = 2;
          const int MODE_ACTION_INCREASE = 3;
          const int MODE_ACTION_DECREASE = 4;
          RemoteMode mode = static_cast<RemoteMode>(id(current_mode));
          bool dual_climate_target =
              !isnan(id(selected_climate_target_temp_low)) &&
              !isnan(id(selected_climate_target_temp_high)) &&
              (id(selected_item_state) == "heat_cool" ||
               id(selected_climate_target_temp_low) != id(selected_climate_target_temp_high));

          if (action == MODE_ACTION_SECONDARY) {
            if (mode == REMOTE_MODE_CLIMATE) {
              id(toggle_selected_climate_power).execute();
            } else if (mode == REMOTE_MODE_HUMIDIFIERS) {
              id(toggle_selected_humidifier_power).execute();
            } else if (mode == REMOTE_MODE_MEDIA) {
              id(select_next_media_source).execute();
            } else {
              id(updated_ui) = true;
            }
            return;
          }

          if (action == MODE_ACTION_PRIMARY) {
            if (mode == REMOTE_MODE_LIGHTS) {
              id(toggle_selected_light).execute();
            } else if (mode == REMOTE_MODE_FANS) {
              id(toggle_selected_fan).execute();
            } else if (mode == REMOTE_MODE_HUMIDIFIERS) {
              id(cycle_selected_humidifier_mode).execute();
            } else if (mode == REMOTE_MODE_SWITCHES) {
              id(turn_on_selected_switch).execute();
            } else if (mode == REMOTE_MODE_CLIMATE) {
              if (dual_climate_target) {
                id(climate_temperature_high_up).execute();
              }
            } else if (mode == REMOTE_MODE_LOCKS) {
              id(lock_selected_lock).execute();
            } else if (mode == REMOTE_MODE_SHADES) {
              id(open_selected_cover).execute();
            } else if (mode == REMOTE_MODE_MEDIA) {
              id(select_next_item).execute();
            } else if (mode == REMOTE_MODE_AUTOMATION) {
              id(trigger_selected_automation).execute();
            } else if (mode == REMOTE_MODE_NOTIFICATIONS) {
              id(dismiss_selected_notification).execute();
            } else {
              id(updated_ui) = true;
            }
            return;
          }

          if (action == MODE_ACTION_PLAY_PAUSE) {
            if (mode == REMOTE_MODE_LIGHTS) {
              id(toggle_selected_light).execute();
            } else if (mode == REMOTE_MODE_FANS) {
              id(toggle_selected_fan).execute();
            } else if (mode == REMOTE_MODE_HUMIDIFIERS) {
              id(updated_ui) = true;
            } else if (mode == REMOTE_MODE_SWITCHES) {
              id(turn_off_selected_switch).execute();
            } else if (mode == REMOTE_MODE_CLIMATE) {
              if (dual_climate_target) {
                id(climate_temperature_high_down).execute();
              }
            } else if (mode == REMOTE_MODE_LOCKS) {
              id(unlock_selected_lock).execute();
            } else if (mode == REMOTE_MODE_SHADES) {
              id(close_selected_cover).execute();
            } else if (mode == REMOTE_MODE_MEDIA) {
              id(media_play_pause).execute();
            } else if (mode == REMOTE_MODE_AUTOMATION) {
              id(trigger_selected_automation).execute();
            } else if (mode == REMOTE_MODE_NOTIFICATIONS) {
              id(dismiss_selected_notification).execute();
            } else {
              id(updated_ui) = true;
            }
            return;
          }

          if (action == MODE_ACTION_INCREASE) {
            if (mode == REMOTE_MODE_LIGHTS) {
              id(increase_brightness).execute();
            } else if (mode == REMOTE_MODE_FANS) {
              id(increase_fan_speed).execute();
            } else if (mode == REMOTE_MODE_HUMIDIFIERS) {
              id(humidifier_target_up).execute();
            } else if (mode == REMOTE_MODE_SHADES) {
              id(increase_cover_position).execute();
            } else if (mode == REMOTE_MODE_CLIMATE) {
              id(climate_temperature_up).execute();
            } else if (mode == REMOTE_MODE_MEDIA) {
              id(media_volume_up).execute();
            } else {
              id(updated_ui) = true;
            }
            return;
          }

          if (action == MODE_ACTION_DECREASE) {
            if (mode == REMOTE_MODE_LIGHTS) {
              id(decrease_brightness).execute();
            } else if (mode == REMOTE_MODE_FANS) {
              id(decrease_fan_speed).execute();
            } else if (mode == REMOTE_MODE_HUMIDIFIERS) {
              id(humidifier_target_down).execute();
            } else if (mode == REMOTE_MODE_SHADES) {
              id(decrease_cover_position).execute();
            } else if (mode == REMOTE_MODE_CLIMATE) {
              id(climate_temperature_down).execute();
            } else if (mode == REMOTE_MODE_MEDIA) {
              id(media_volume_down).execute();
            } else {
              id(updated_ui) = true;
            }
          }

