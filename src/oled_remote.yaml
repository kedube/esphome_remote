    then:
      - delay: ${LONG_PRESS_DURATION_MS}ms
      - lambda: |-
          bool same_mode = id(primary_button_press_mode) == id(current_mode);
          bool still_pressed = id(primary_mode_button).state;
          bool already_fired = id(primary_button_long_press_fired);

          if (id(primary_button_press_started_at) == 0 || !same_mode || !still_pressed || already_fired) {
            return;
          }

          id(primary_button_long_press_fired) = true;
          id(primary_mode_action).execute();

