          std::string current = id(selected_item_state);
          if (current == "off" || current == "unknown") {
            current = id(last_climate_mode);
          }

          std::string next = "heat";
          if (current == "heat") {
            next = "cool";
          } else if (current == "cool") {
            next = "heat_cool";
          } else if (current == "heat_cool") {
            next = "heat";
          }

          id(last_climate_mode) = next;
          id(selected_item_state) = next;
          id(updated_ui) = true;
      - homeassistant.service:
