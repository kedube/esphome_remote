esphome:
  name: ${DEVICE_NAME}
  friendly_name: ${FRIENDLY_NAME}
  min_version: 2026.1.0
  name_add_mac_suffix: false
  platformio_options:
    build_flags:
      - -DREMOTE_FRAMEBUFFER_WEB_DEBUG=${FRAMEBUFFER_WEB_DEBUG}
  includes:
    - entity_helpers.h
    - framebuffer_web_debug.h
    - framebuffer_web_debug.cpp
    - local_entities.h
  on_boot:
    - priority: 250
      then:
        - lambda: |-
            ensure_light_status_tracker();
            id(last_active) = millis() / 1000;
            uint64_t state = id(persisted_ui_state);
            constexpr uint64_t UI_STATE_FORMAT_V2 = 1ULL << 63;
            constexpr uint64_t UI_STATE_FORMAT_V3 = (1ULL << 63) | (1ULL << 62);
            constexpr uint64_t UI_STATE_FORMAT_V4 = (1ULL << 63) | (1ULL << 62) | (1ULL << 61);
            constexpr uint64_t UI_STATE_FORMAT_V5 = (1ULL << 63) | (1ULL << 62) | (1ULL << 61) | (1ULL << 60);
            int restored_contrast = state & 0x0F;
            int restored_mode = 0;
            auto remap_v2_mode = [](int old_mode) {
              switch (old_mode) {
                case 0:
                  return REMOTE_MODE_LIGHTS;
                case 1:
                  return REMOTE_MODE_SWITCHES;
                case 2:
                  return REMOTE_MODE_CLIMATE;
                case 3:
                  return REMOTE_MODE_LOCKS;
                case 4:
                  return REMOTE_MODE_SHADES;
                case 5:
                  return REMOTE_MODE_MEDIA;
                case 6:
                  return REMOTE_MODE_AUTOMATION;
                case 7:
                  return REMOTE_MODE_WEATHER;
                case 8:
                  return REMOTE_MODE_INFO;
                case 9:
                  return REMOTE_MODE_FANS;
                case 10:
                  return REMOTE_MODE_HUMIDIFIERS;
                default:
                  return REMOTE_MODE_INFO;
              }
            };
            auto remap_v3_mode = [](int old_mode) {
              switch (old_mode) {
                case 0:
                  return REMOTE_MODE_LIGHTS;
                case 1:
                  return REMOTE_MODE_SWITCHES;
                case 2:
                  return REMOTE_MODE_CLIMATE;
                case 3:
                  return REMOTE_MODE_HUMIDIFIERS;
                case 4:
                  return REMOTE_MODE_FANS;
                case 5:
                  return REMOTE_MODE_SHADES;
                case 6:
                  return REMOTE_MODE_LOCKS;
                case 7:
                  return REMOTE_MODE_MEDIA;
                case 8:
                  return REMOTE_MODE_AUTOMATION;
                case 9:
                  return REMOTE_MODE_WEATHER;
                case 10:
                  return REMOTE_MODE_INFO;
                default:
                  return REMOTE_MODE_INFO;
              }
            };
            auto remap_v4_mode = [](int old_mode) {
              switch (old_mode) {
                case 0:
                  return REMOTE_MODE_LIGHTS;
                case 1:
                  return REMOTE_MODE_SWITCHES;
                case 2:
                  return REMOTE_MODE_CLIMATE;
                case 3:
                  return REMOTE_MODE_HUMIDIFIERS;
                case 4:
                  return REMOTE_MODE_FANS;
                case 5:
                  return REMOTE_MODE_SHADES;
                case 6:
                  return REMOTE_MODE_LOCKS;
                case 7:
                  return REMOTE_MODE_MEDIA;
                case 8:
                  return REMOTE_MODE_AUTOMATION;
                case 9:
                  return REMOTE_MODE_NOTIFICATIONS;
                case 10:
                  return REMOTE_MODE_WEATHER;
                case 11:
                  return REMOTE_MODE_INFO;
                default:
                  return REMOTE_MODE_INFO;
              }
            };

            if ((state & UI_STATE_FORMAT_V5) == UI_STATE_FORMAT_V5) {
              restored_mode = (state >> 4) & 0x0F;
              id(selected_light_index) = (state >> 8) & 0x3F;
              id(selected_switch_index) = (state >> 14) & 0x3F;
              id(selected_climate_index) = (state >> 20) & 0x3F;
              id(selected_lock_index) = (state >> 26) & 0x3F;
              id(selected_cover_index) = (state >> 32) & 0x3F;
              id(selected_media_index) = (state >> 38) & 0x3F;
              id(selected_automation_index) = (state >> 44) & 0x3F;
              id(selected_weather_index) = (state >> 50) & 0x3F;
              id(selected_time_index) = (state >> 56) & 0x1F;
              id(selected_fan_index) = id(persisted_ui_state_aux) & 0x3F;
              id(selected_humidifier_index) = (id(persisted_ui_state_aux) >> 6) & 0x3F;
            } else if ((state & UI_STATE_FORMAT_V2) != 0) {
              if ((state & UI_STATE_FORMAT_V4) == UI_STATE_FORMAT_V4) {
                restored_mode = remap_v4_mode((state >> 4) & 0x0F);
                id(selected_light_index) = (state >> 8) & 0x3F;
                id(selected_switch_index) = (state >> 14) & 0x3F;
                id(selected_climate_index) = (state >> 20) & 0x3F;
                id(selected_lock_index) = (state >> 26) & 0x3F;
                id(selected_cover_index) = (state >> 32) & 0x3F;
                id(selected_media_index) = (state >> 38) & 0x3F;
                id(selected_automation_index) = (state >> 44) & 0x3F;
                id(selected_weather_index) = (state >> 50) & 0x3F;
                id(selected_time_index) = (state >> 56) & 0x1F;
                id(selected_fan_index) = 0;
                id(selected_humidifier_index) = 0;
              } else if ((state & UI_STATE_FORMAT_V3) == UI_STATE_FORMAT_V3) {
                restored_mode = remap_v3_mode((state >> 4) & 0x0F);
                id(selected_light_index) = (state >> 8) & 0x3F;
                id(selected_switch_index) = (state >> 14) & 0x3F;
                id(selected_climate_index) = (state >> 20) & 0x3F;
                id(selected_lock_index) = (state >> 26) & 0x3F;
                id(selected_cover_index) = (state >> 32) & 0x3F;
                id(selected_media_index) = (state >> 38) & 0x3F;
                id(selected_automation_index) = (state >> 44) & 0x3F;
                id(selected_weather_index) = (state >> 50) & 0x3F;
                id(selected_time_index) = (state >> 56) & 0x3F;
                id(selected_fan_index) = 0;
                id(selected_humidifier_index) = 0;
              } else {
                restored_mode = remap_v2_mode((state >> 4) & 0x0F);
                id(selected_light_index) = (state >> 8) & 0x3F;
                id(selected_switch_index) = (state >> 14) & 0x3F;
                id(selected_climate_index) = (state >> 20) & 0x3F;
                id(selected_lock_index) = (state >> 26) & 0x3F;
                id(selected_cover_index) = (state >> 32) & 0x3F;
                id(selected_media_index) = (state >> 38) & 0x3F;
                id(selected_automation_index) = (state >> 44) & 0x3F;
                id(selected_weather_index) = (state >> 50) & 0x3F;
                id(selected_time_index) = (state >> 56) & 0x3F;
                id(selected_fan_index) = 0;
                id(selected_humidifier_index) = 0;
              }
            } else {
              int old_mode = (state >> 4) & 0x07;
              restored_mode =
                  old_mode == 0 ? REMOTE_MODE_LIGHTS :
                  old_mode == 1 ? REMOTE_MODE_SWITCHES :
                  old_mode == 2 ? REMOTE_MODE_CLIMATE :
                  old_mode == 3 ? REMOTE_MODE_LOCKS :
                  old_mode == 4 ? REMOTE_MODE_MEDIA :
                  old_mode == 5 ? REMOTE_MODE_AUTOMATION :
                  old_mode == 6 ? REMOTE_MODE_WEATHER :
                  REMOTE_MODE_INFO;
              id(selected_light_index) = (state >> 7) & 0x3F;
              id(selected_switch_index) = (state >> 13) & 0x3F;
              id(selected_climate_index) = (state >> 19) & 0x3F;
              id(selected_lock_index) = (state >> 25) & 0x3F;
              id(selected_cover_index) = 0;
              id(selected_media_index) = (state >> 31) & 0x3F;
              id(selected_automation_index) = (state >> 37) & 0x3F;
              id(selected_weather_index) = (state >> 43) & 0x3F;
              id(selected_time_index) = (state >> 49) & 0x3F;
              id(selected_fan_index) = 0;
              id(selected_humidifier_index) = 0;
            }

            if (restored_contrast >= 1 && restored_contrast <= 10) {
              id(contrast) = restored_contrast;
            } else {
              id(contrast) = 5;
            }
            id(oled_display).set_contrast(id(contrast) * 1.0f / 10.0f);

            if (restored_mode < 0 || restored_mode >= REMOTE_MODE_COUNT) {
              id(current_mode) = first_available_mode();
            } else {
              RemoteMode restored = static_cast<RemoteMode>(restored_mode);
              id(current_mode) = mode_is_available(restored) ? restored : first_available_mode();
            }
            id(updated_ui) = true;
        - script.execute: update_selected_item
    - priority: -100
      then:
        - lambda: |-
            register_framebuffer_web_debug(id(oled_display));

preferences:
  flash_write_interval: 5s

esp32:
  board: ${BOARD}
  flash_size: 4MB
  framework:
    type: arduino
    advanced:
      minimum_chip_revision: "3.1"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 10dB
  fast_connect: true
  power_save_mode: LIGHT

api:
  homeassistant_states: true
  reboot_timeout: 0s
  encryption:
    key: !secret encryption_key

json:

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time_sync:
      then:
        - lambda: |-
            id(updated_ui) = true;
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - lambda: |-
              id(updated_ui) = true;

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO # DEBUG

deep_sleep:
  id: go_sleep
  sleep_duration: ${DEEP_SLEEP_DURATION}
  wakeup_pin:
    number: ${PIN_WAKE}
    allow_other_uses: true
    ignore_strapping_warning: true
  wakeup_pin_mode: INVERT_WAKEUP

i2c:
  sda: ${PIN_I2C_SDA}
  scl: ${PIN_I2C_SCL}
  frequency: 400kHz
  scan: false

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    rotation: 180
    contrast: 0.5
    id: oled_display

