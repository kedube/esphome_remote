  - id: show_sensitive_action_prompt
    parameters:
      action: int
    then:
      - lambda: |-
          const int MODE_ACTION_PRIMARY = 0;
          const int MODE_ACTION_PLAY_PAUSE = 2;
          RemoteMode mode = static_cast<RemoteMode>(id(current_mode));
          std::string feedback;

          if (mode == REMOTE_MODE_LOCKS) {
            feedback = action == MODE_ACTION_PLAY_PAUSE ? "HOLD TO UNLOCK" : "HOLD TO LOCK";
            id(last_lock_feedback) = feedback;
            id(last_lock_interaction) = millis();
          } else if (mode == REMOTE_MODE_SHADES) {
            feedback = action == MODE_ACTION_PLAY_PAUSE ? "HOLD TO CLOSE" : "HOLD TO OPEN";
            id(last_cover_feedback) = feedback;
            id(last_cover_interaction) = millis();
          } else if (mode == REMOTE_MODE_AUTOMATION) {
            id(last_automation_feedback) = "HOLD TO RUN";
            id(last_automation_interaction) = millis();
          } else {
            return;
          }

          id(updated_ui) = true;
      - script.execute: update_display

