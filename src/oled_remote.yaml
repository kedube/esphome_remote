            lambda: 'return id(updated_ui) == true;'
          then:
            - lambda: |-
                auto it = id(oled_display);
                char status_line[27];
                char footer_line[27];
                char detail_line[27];
                const int bar_x = 14;
                const int bar_y = 45;
                const int bar_w = 100;
                const int bar_h = 8;
                RemoteMode mode = static_cast<RemoteMode>(id(current_mode));
                uint32_t now = millis();
                status_line[0] = '\0';
                footer_line[0] = '\0';
                detail_line[0] = '\0';

                auto upper = [](std::string text) {
                  for (auto &ch : text) {
                    if (ch >= 'a' && ch <= 'z') {
                      ch = ch - 'a' + 'A';
                    } else if (ch == '_') {
                      ch = ' ';
                    }
                  }
                  return text;
                };
                auto recent_interaction = [&](uint32_t last_interaction, uint32_t duration_ms) {
                  return last_interaction > 0 && (now - last_interaction) <= duration_ms;
                };
                bool show_brightness_bar =
                    recent_interaction(id(last_brightness_interaction), 3000) &&
                    id(selected_item_state) == "on" && mode == REMOTE_MODE_LIGHTS;
                bool show_fan_speed_bar =
                    recent_interaction(id(last_fan_speed_interaction), 3000) &&
                    id(selected_item_state) == "on" && mode == REMOTE_MODE_FANS;
                bool show_humidifier_target =
                    recent_interaction(id(last_humidifier_interaction), 5000) &&
                    mode == REMOTE_MODE_HUMIDIFIERS;
                bool show_humidifier_mode =
                    recent_interaction(id(last_humidifier_mode_interaction), 5000) &&
                    mode == REMOTE_MODE_HUMIDIFIERS;
                bool show_cover_position_bar =
                    recent_interaction(id(last_cover_position_interaction), 3000) &&
                    mode == REMOTE_MODE_SHADES;
                bool show_switch_feedback =
                    recent_interaction(id(last_switch_interaction), 5000) &&
                    mode == REMOTE_MODE_SWITCHES;
                bool show_contrast_feedback =
                    recent_interaction(id(last_contrast_interaction), 3000);
                bool show_climate_target_focus =
                    recent_interaction(id(last_climate_target_focus_interaction), 5000) &&
                    id(climate_target_focus) != 0 && mode == REMOTE_MODE_CLIMATE;
                bool show_lock_feedback =
                    recent_interaction(id(last_lock_interaction), 5000) &&
                    mode == REMOTE_MODE_LOCKS;
                bool show_cover_feedback =
                    recent_interaction(id(last_cover_interaction), 5000) &&
                    mode == REMOTE_MODE_SHADES;
                bool show_media_feedback =
                    recent_interaction(id(last_media_volume_interaction), 3000) &&
                    mode == REMOTE_MODE_MEDIA;
                bool show_media_source_feedback =
                    recent_interaction(id(last_media_source_interaction), 5000) &&
                    mode == REMOTE_MODE_MEDIA;
                bool show_media_power_feedback =
                    recent_interaction(id(last_media_power_interaction), 5000) &&
                    mode == REMOTE_MODE_MEDIA;
                bool show_automation_feedback =
                    recent_interaction(id(last_automation_interaction), 5000) &&
                    mode == REMOTE_MODE_AUTOMATION;
                auto has_dual_climate_target = [&]() {
                  return !isnan(id(selected_climate_target_temp_low)) &&
                         !isnan(id(selected_climate_target_temp_high)) &&
                         (id(selected_item_state) == "heat_cool" ||
                          id(selected_climate_target_temp_low) != id(selected_climate_target_temp_high));
                };
                auto draw_footer_dividers = [&]() {
                  it->filled_rectangle(0, 52, 128, 1, COLOR_ON);
                  it->filled_rectangle(38, 53, 1, 11, COLOR_ON);
                  it->filled_rectangle(90, 53, 1, 11, COLOR_ON);
                };
                auto draw_contrast_footer = [&]() {
                  snprintf(footer_line, sizeof(footer_line), "CONTRAST %d%%", id(contrast) * 10);
                  it->filled_rectangle(0, 52, 128, 1, COLOR_ON);
                  it->print(64, 58, id(small_font), COLOR_ON, display::TextAlign::CENTER, footer_line);
                };
                auto draw_footer_chrome = [&](const char *left_icon, const char *right_icon) {
                  draw_footer_dividers();
                  it->printf(10, 50, id(medium_symbols), COLOR_ON, left_icon);
                  it->printf(104, 50, id(medium_symbols), COLOR_ON, right_icon);
                };
                auto draw_default_footer = [&]() {
                  draw_footer_chrome("\ueac3", "\ueac9");
                  it->printf(58, 51, id(symbols), COLOR_ON, "\ue1ac");
                };
                auto draw_footer_text = [&](const char *text) {
                  it->print(64, 58, id(small_font), COLOR_ON, display::TextAlign::CENTER, text);
                };
                auto draw_progress_bar = [&](int percent) {
                  int fill = (bar_w - 2) * percent / 100;
                  it->rectangle(bar_x, bar_y, bar_w, bar_h, COLOR_ON);
                  if (fill > 0) {
                    it->filled_rectangle(bar_x + 1, bar_y + 1, fill, bar_h - 2, COLOR_ON);
                  }
                };
                auto draw_progress_footer = [&](int percent, const char *label) {
                  draw_progress_bar(percent);
                  snprintf(footer_line, sizeof(footer_line), "%s %d%%", label, percent);
                  draw_footer_text(footer_line);
                };
                auto format_time = [&]() -> std::string {
                  auto time_now = id(homeassistant_time).now();
                  if (!time_now.is_valid()) {
                    return "--:--";
                  }
                  int hour = time_now.hour % 12;
                  if (hour == 0) {
                    hour = 12;
                  }
                  char time_buffer[9];
                  snprintf(
                      time_buffer, sizeof(time_buffer), "%d:%02d %s", hour, time_now.minute,
                      time_now.hour >= 12 ? "PM" : "AM");
                  return std::string(time_buffer);
                };
                auto format_date = [&]() -> std::string {
                  auto time_now = id(homeassistant_time).now();
                  if (!time_now.is_valid()) {
                    return "--/--/----";
                  }
                  char date_buffer[11];
                  snprintf(
                      date_buffer, sizeof(date_buffer), "%02d/%02d/%04d", time_now.month, time_now.day_of_month,
                      time_now.year);
                  return std::string(date_buffer);
                };

                it->clear();
                const char *header_icon = mode_icon(mode);
                it->print(10, -3, id(symbols), COLOR_ON, display::TextAlign::LEFT, header_icon);
                it->printf(64, 4, id(small_font), COLOR_ON, display::TextAlign::CENTER, mode_title(mode));
                it->print(118, -3, id(symbols), COLOR_ON, display::TextAlign::RIGHT, header_icon);

                it->filled_rectangle(0, 12, 128, 1, COLOR_ON);
                if (mode != REMOTE_MODE_NOTIFICATIONS) {
                  it->printf(64, 20, id(medium_font), COLOR_ON, display::TextAlign::CENTER, id(selected_item_name).c_str());
                }

                switch (mode) {
                  case REMOTE_MODE_LIGHTS:
                    if (id(selected_item_state) == "on") {
                      snprintf(status_line, sizeof(status_line), "ON");
                    } else if (id(selected_item_state) == "off") {
                      snprintf(status_line, sizeof(status_line), "OFF");
                    } else {
                      snprintf(status_line, sizeof(status_line), "SYNCING");
                    }
                    it->print(64, 35, id(medium_font), COLOR_ON, display::TextAlign::CENTER, status_line);

                    if (id(selected_item_state) == "on" && !show_brightness_bar) {
                      snprintf(detail_line, sizeof(detail_line), "%d%%", id(selected_brightness_pct));
                      it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);
                    }

                    if (show_brightness_bar) {
                      draw_progress_footer(id(selected_brightness_pct), "BRIGHTNESS");
                    } else if (show_contrast_feedback) {
                      draw_contrast_footer();
                    } else {
                      draw_default_footer();
                      it->filled_rectangle(90, 54, 1, 11, COLOR_ON);
                    }
                    break;

                  case REMOTE_MODE_FANS:
                    if (id(selected_item_state) == "on") {
                      snprintf(status_line, sizeof(status_line), "ON");
                    } else if (id(selected_item_state) == "off") {
                      snprintf(status_line, sizeof(status_line), "OFF");
                    } else {
                      snprintf(status_line, sizeof(status_line), "SYNCING");
                    }
                    it->print(64, 35, id(medium_font), COLOR_ON, display::TextAlign::CENTER, status_line);

                    if (id(selected_item_state) == "on" && id(selected_fan_speed_pct) > 0 && !show_fan_speed_bar) {
                      snprintf(detail_line, sizeof(detail_line), "%d%%", id(selected_fan_speed_pct));
                      it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);
                    }

                    if (show_fan_speed_bar) {
                      draw_progress_footer(id(selected_fan_speed_pct), "SPEED");
                    } else if (show_contrast_feedback) {
                      draw_contrast_footer();
                    } else {
                      draw_default_footer();
                      it->filled_rectangle(90, 54, 1, 11, COLOR_ON);
                    }
                    break;

                  case REMOTE_MODE_SWITCHES: {
                    std::string switch_state = upper(id(selected_item_state));
                    std::string switch_feedback = upper(id(last_switch_feedback));
                    if (switch_state == "UNKNOWN" || switch_state.empty()) {
                      switch_state = "SYNCING";
                    }
                    snprintf(status_line, sizeof(status_line), "%s", switch_state.c_str());
                    it->print(64, 33, id(medium_font), COLOR_ON, display::TextAlign::CENTER, status_line);

                    if (show_switch_feedback && !switch_feedback.empty()) {
                      snprintf(detail_line, sizeof(detail_line), "%s", switch_feedback.c_str());
                      it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);
                    }

                    if (show_contrast_feedback) {
                      draw_contrast_footer();
                    } else {
                      draw_default_footer();
                    }
                    break;
                  }

                  case REMOTE_MODE_CLIMATE: {
                    std::string hvac_label = upper(id(selected_item_state));
                    std::string action_label = upper(id(selected_climate_hvac_action));
                    bool has_dual_target = has_dual_climate_target();
                    if (hvac_label == "UNKNOWN") {
                      hvac_label = "SYNCING";
                    }
                    if (show_climate_target_focus) {
                      if (!isnan(id(climate_target_focus_value))) {
                        if (!has_dual_target) {
                          snprintf(status_line, sizeof(status_line), "TARGET: %.0f°${TEMPERATURE_UNIT}", id(climate_target_focus_value));
                        } else if (id(climate_target_focus) == 2) {
                          snprintf(status_line, sizeof(status_line), "HIGH: %.0f°${TEMPERATURE_UNIT}", id(climate_target_focus_value));
                        } else {
                          snprintf(status_line, sizeof(status_line), "LOW: %.0f°${TEMPERATURE_UNIT}", id(climate_target_focus_value));
                        }
                      }
                    } else if (!isnan(id(selected_climate_current_temp))) {
                      snprintf(status_line, sizeof(status_line), "%.0f°${TEMPERATURE_UNIT}", id(selected_climate_current_temp));
                    } else {
                      snprintf(status_line, sizeof(status_line), "SYNCING");
                    }
                    it->print(64, 35, id(medium_font), COLOR_ON, display::TextAlign::CENTER, status_line);

                    if (!show_climate_target_focus && has_dual_target && action_label != "UNKNOWN") {
                      snprintf(detail_line, sizeof(detail_line), "LOW: %.0f°${TEMPERATURE_UNIT}   HIGH: %.0f°${TEMPERATURE_UNIT}",
                               id(selected_climate_target_temp_low), id(selected_climate_target_temp_high));
                      it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);
                    } else if (
                        !show_climate_target_focus && !isnan(id(selected_climate_target_temp)) &&
                        action_label != "UNKNOWN") {
                      snprintf(detail_line, sizeof(detail_line), "TARGET: %.0f°${TEMPERATURE_UNIT}", id(selected_climate_target_temp));
                      it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);
                    }

                    if (show_contrast_feedback) {
                      draw_contrast_footer();
                    } else {
                      draw_footer_chrome("\ueac3", "\ueac9");
                      if (hvac_label != "SYNCING" && action_label != "UNKNOWN") {
                        snprintf(status_line, sizeof(status_line), "%s", action_label.c_str());
                        draw_footer_text(status_line);
                      } else {
                        it->printf(58, 51, id(symbols), COLOR_ON, "\ue1ac");
                      }
                    }
                    break;
                  }

                  case REMOTE_MODE_HUMIDIFIERS: {
                    std::string humidifier_state = upper(id(selected_item_state));
                    std::string action_label = upper(id(selected_humidifier_action));
                    std::string humidifier_mode = upper(id(selected_humidifier_mode));
                    if (humidifier_state == "UNKNOWN" || humidifier_state.empty()) {
                      humidifier_state = "SYNCING";
                    }

                    if (show_humidifier_target && !isnan(id(selected_humidifier_target_humidity))) {
                      snprintf(status_line, sizeof(status_line), "TARGET: %.0f%%", id(selected_humidifier_target_humidity));
                    } else if (!isnan(id(selected_humidifier_current_humidity))) {
                      snprintf(status_line, sizeof(status_line), "%.0f%%", id(selected_humidifier_current_humidity));
                    } else {
                      snprintf(status_line, sizeof(status_line), "SYNCING");
                    }
                    it->print(64, 35, id(medium_font), COLOR_ON, display::TextAlign::CENTER, status_line);

                    if (show_humidifier_mode && !humidifier_mode.empty()) {
                      snprintf(detail_line, sizeof(detail_line), "%s", humidifier_mode.c_str());
                      it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);
                    } else if (!show_humidifier_target && !isnan(id(selected_humidifier_target_humidity))) {
                      snprintf(detail_line, sizeof(detail_line), "TARGET: %.0f%%", id(selected_humidifier_target_humidity));
                      it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);
                    }

                    if (show_contrast_feedback) {
                      draw_contrast_footer();
                    } else {
                      draw_footer_chrome("\ueac3", "\ueac9");
                      if (action_label != "UNKNOWN" && !action_label.empty()) {
                        snprintf(footer_line, sizeof(footer_line), "%s", action_label.c_str());
                        draw_footer_text(footer_line);
                      } else if (humidifier_state != "SYNCING") {
                        snprintf(footer_line, sizeof(footer_line), "%s", humidifier_state.c_str());
                        draw_footer_text(footer_line);
                      } else {
                        it->printf(58, 51, id(symbols), COLOR_ON, "\ue1ac");
                      }
                    }
                    break;
                  }

                  case REMOTE_MODE_LOCKS: {
                    std::string lock_state = upper(id(selected_item_state));
                    std::string lock_feedback = upper(id(last_lock_feedback));
                    if (lock_state == "UNKNOWN" || lock_state.empty()) {
                      lock_state = "SYNCING";
                    }
                    snprintf(status_line, sizeof(status_line), "%s", lock_state.c_str());
                    it->print(64, 33, id(small_font), COLOR_ON, display::TextAlign::CENTER, status_line);

                    if (show_lock_feedback && !lock_feedback.empty()) {
                      snprintf(detail_line, sizeof(detail_line), "%s", lock_feedback.c_str());
                      it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);
                    }

                    if (show_contrast_feedback) {
                      draw_contrast_footer();
                    } else {
                      draw_default_footer();
                    }
                    break;
                  }

                  case REMOTE_MODE_SHADES: {
                    std::string cover_state = upper(id(selected_item_state));
                    std::string cover_feedback = upper(id(last_cover_feedback));
                    if (cover_state == "UNKNOWN" || cover_state.empty()) {
                      cover_state = "SYNCING";
                    }
                    snprintf(status_line, sizeof(status_line), "%s", cover_state.c_str());
                    it->print(64, 33, id(small_font), COLOR_ON, display::TextAlign::CENTER, status_line);

                    if (show_cover_position_bar) {
                      draw_progress_footer(id(selected_cover_position_pct), "POSITION");
                    } else {
                      if (show_cover_feedback && !cover_feedback.empty()) {
                        snprintf(detail_line, sizeof(detail_line), "%s", cover_feedback.c_str());
                      } else if (cover_state == "OPEN") {
                        snprintf(detail_line, sizeof(detail_line), "%d%%", id(selected_cover_position_pct));
                      }
                      it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);

                      if (show_contrast_feedback) {
                        draw_contrast_footer();
                      } else {
                        draw_default_footer();
                      }
                    }
                    break;
                  }

                  case REMOTE_MODE_MEDIA: {
                    std::string playback = upper(id(selected_item_state));
                    std::string device_class = id(selected_media_device_class);
                    bool is_tv = device_class == "tv" || device_class == "receiver";
                    bool is_speaker = device_class == "speaker";
                    bool media_is_on = id(selected_item_state) != "off" && id(selected_item_state) != "unknown";
                    if (playback == "UNKNOWN") {
                      playback = "SYNCING";
                    }
                    if (is_tv) {
                      snprintf(status_line, sizeof(status_line), "%s", media_is_on ? "ON" : "OFF");
                      it->print(64, 33, id(medium_font), COLOR_ON, display::TextAlign::CENTER, status_line);
                    } else if (!id(selected_media_title).empty()) {
                      snprintf(status_line, sizeof(status_line), "%s", id(selected_media_title).c_str());
                      it->print(64, 33, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, status_line);
                    }
                    if (!is_tv && !show_media_feedback && show_media_power_feedback && !id(last_media_power_feedback).empty()) {
                      snprintf(detail_line, sizeof(detail_line), "%s", id(last_media_power_feedback).c_str());
                      it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);
                    } else if (!show_media_feedback && show_media_source_feedback && !id(selected_media_source).empty()) {
                      snprintf(detail_line, sizeof(detail_line), "%s", id(selected_media_source).c_str());
                      it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);
                    } else if (is_tv && media_is_on && !id(selected_media_source).empty()) {
                      snprintf(detail_line, sizeof(detail_line), "%s", id(selected_media_source).c_str());
                      it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);
                    } else if (!show_media_feedback && !id(selected_media_artist).empty()) {
                      snprintf(detail_line, sizeof(detail_line), "%s", id(selected_media_artist).c_str());
                      it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);
                    }

                    if (show_media_feedback) {
                      draw_progress_footer(id(selected_media_volume_pct), "VOLUME");
                    } else if (show_contrast_feedback) {
                      draw_contrast_footer();
                    } else {
                      if (is_tv) {
                        draw_footer_chrome("\uead0", "\ueacf");
                      } else {
                        draw_footer_chrome("\ue045", "\ue044");
                      }
                      if (playback == "PAUSED") {
                        it->printf(64, 58, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, "PAUSED");
                      } else if (playback == "PLAYING") {
                        it->printf(64, 58, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, "PLAYING");
                      } else if (playback == "IDLE") {
                        it->printf(64, 58, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, "IDLE");
                      } else {
                        it->printf(58, 51, id(symbols), COLOR_ON, is_speaker ? "\ue047" : "\ue8ac");
                      }
                    }
                    break;
                  }

                  case REMOTE_MODE_SENSORS: {
                    std::string sensor_value = id(selected_item_state);
                    if (sensor_value == "unknown" || sensor_value.empty()) {
                      sensor_value = "SYNCING";
                    } else if (sensor_value == "on") {
                      sensor_value = "ON";
                    } else if (sensor_value == "off") {
                      sensor_value = "OFF";
                    }

                    if (sensor_value.size() <= 12) {
                      it->print(64, 33, id(medium_font), COLOR_ON, display::TextAlign::CENTER, sensor_value.c_str());
                    } else {
                      it->print(64, 33, id(small_font), COLOR_ON, display::TextAlign::CENTER, sensor_value.c_str());
                    }

                    if (show_contrast_feedback) {
                      draw_contrast_footer();
                    } else {
                      draw_default_footer();
                    }
                    break;
                  }

                  case REMOTE_MODE_AUTOMATION: {
                    std::string automation_state = upper(id(selected_item_state));
                    std::string automation_feedback = upper(id(last_automation_feedback));
                    const char *automation_type = automation_kind_label(id(selected_automation_index));
                    if (automation_state == "UNKNOWN" || automation_state.empty()) {
                      automation_state = "READY";
                    }
                    if (show_automation_feedback && !automation_feedback.empty()) {
                      snprintf(status_line, sizeof(status_line), "%s", automation_feedback.c_str());
                    } else {
                      snprintf(status_line, sizeof(status_line), "%s", automation_state.c_str());
                    }
                    it->print(64, 33, id(small_font), COLOR_ON, display::TextAlign::CENTER, automation_type);
                    it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, status_line);

                    if (show_contrast_feedback) {
                      draw_contrast_footer();
                    } else {
                      draw_default_footer();
                    }
                    break;
                  }

                  case REMOTE_MODE_ALARMS: {
                    std::string alarm_state = upper(id(selected_item_state));
                    if (alarm_state == "UNKNOWN" || alarm_state.empty()) {
                      alarm_state = "SYNCING";
                    }
                    it->print(64, 33, id(small_font), COLOR_ON, display::TextAlign::CENTER, alarm_state.c_str());

                    if (show_contrast_feedback) {
                      draw_contrast_footer();
                    } else {
                      draw_default_footer();
                    }
                    break;
                  }

                  case REMOTE_MODE_NOTIFICATIONS: {
                    std::string message = id(selected_item_state);
                    bool show_dismiss_feedback =
                        id(last_notification_dismiss_interaction) > 0 &&
                        (millis() - id(last_notification_dismiss_interaction)) <= 3000;
                    auto sanitize_message = [](std::string text) {
                      for (auto &ch : text) {
                        if (ch == '\n' || ch == '\r' || ch == '\t') {
                          ch = ' ';
                        }
                      }
                      return text;
                    };
                    auto draw_notification_line = [&](int y, const std::string &text) {
                      if (!text.empty()) {
                        it->print(64, y, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, text.c_str());
                      }
                    };

                    std::string line_1;
                    std::string line_2;
                    std::string line_3;

                    if (show_dismiss_feedback) {
                      line_2 = "DISMISSED";
                    } else {
                      message = sanitize_message(message);
                      if (message.empty()) {
                        message = "NO NOTIFICATIONS";
                      }

                      bool truncated = message.size() > 66;
                      if (message.size() > 66) {
                        message = message.substr(0, 66);
                      }

                      line_1 = message.substr(0, std::min<size_t>(22, message.size()));
                      line_2 = message.size() > 22 ? message.substr(22, std::min<size_t>(22, message.size() - 22)) : "";
                      line_3 = message.size() > 44 ? message.substr(44, std::min<size_t>(22, message.size() - 44)) : "";
                      if (truncated && line_3.size() >= 3) {
                        line_3.replace(line_3.size() - 3, 3, "...");
                      } else if (truncated) {
                        line_3 = "...";
                      }
                    }

                    draw_notification_line(20, line_1);
                    draw_notification_line(33, line_2);
                    draw_notification_line(45, line_3);

                    if (show_contrast_feedback) {
                      draw_contrast_footer();
                    } else {
                      draw_default_footer();
                    }
                    break;
                  }

                  case REMOTE_MODE_WEATHER: {
                    std::string condition = upper(id(selected_weather_condition));
                    if (condition == "UNKNOWN") {
                      condition = "SYNCING";
                    }

                    if (!isnan(id(selected_weather_temperature))) {
                      snprintf(status_line, sizeof(status_line), "%.0f°${TEMPERATURE_UNIT}", id(selected_weather_temperature));
                    } else {
                      snprintf(status_line, sizeof(status_line), "SYNCING");
                    }
                    it->print(64, 33, id(medium_font), COLOR_ON, display::TextAlign::CENTER, status_line);

                    if (condition != "SYNCING" && !condition.empty()) {
                       it->print(64, 45, id(small_font), COLOR_ON, display::TextAlign::CENTER, condition.c_str());
                    }

                    if (show_contrast_feedback) {
                      draw_contrast_footer();
                    } else {
                      draw_footer_chrome("\ueac3", "\ueac9");
                      if (condition != "SYNCING" && !isnan(id(selected_weather_humidity))) {
                        snprintf(footer_line, sizeof(footer_line), "%.0f%%", id(selected_weather_humidity));
                        it->print(64, 58, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, footer_line);
                      } else {
                        it->printf(58, 51, id(symbols), COLOR_ON, "\ue1ac");
                      }
                    }
                    break;
                  }

                  case REMOTE_MODE_INFO:
                  default:
                    if (id(selected_time_index) == 0) {
                      std::string time_label = format_time();
                      std::string date_label = format_date();

                      it->print(64, 33, id(medium_font), COLOR_ON, display::TextAlign::CENTER, time_label.c_str());
                      it->print(64, 45, id(small_font), COLOR_ON, display::TextAlign::CENTER, date_label.c_str());

                      if (show_contrast_feedback) {
                        draw_contrast_footer();
                      } else {
                        draw_default_footer();
                      }
                    } else if (id(selected_time_index) == 1) {
                      std::string ssid_label = wifi::global_wifi_component != nullptr
                          ? wifi::global_wifi_component->wifi_ssid()
                          : "";
                      std::string ip_label;
                      if (wifi::global_wifi_component != nullptr) {
                        auto ip_addresses = wifi::global_wifi_component->wifi_sta_ip_addresses();
                        for (const auto &ip : ip_addresses) {
                          if (ip.is_set()) {
                            char ip_buffer[network::IP_ADDRESS_BUFFER_SIZE];
                            ip_label = ip.str_to(ip_buffer);
                            break;
                          }
                        }
                      }

                      if (ssid_label.empty()) {
                        ssid_label = "DISCONNECTED";
                      }
                      if (ip_label.empty() || ip_label == "0.0.0.0") {
                        ip_label = "NO IP ADDRESS";
                      }

                      it->print(64, 33, id(small_font), COLOR_ON, display::TextAlign::CENTER, ssid_label.c_str());
                      it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, ip_label.c_str());

                      if (show_contrast_feedback) {
                        draw_contrast_footer();
                      } else {
                        draw_default_footer();
                      }
                    } else {
                      snprintf(status_line, sizeof(status_line), "${VERSION}");
                      it->print(64, 33, id(medium_font), COLOR_ON, display::TextAlign::CENTER, status_line);

                      if (id(battery_monitoring_available)) {
                        snprintf(detail_line, sizeof(detail_line), "BATTERY: %d%% (%.02fV)", id(battery_percentage), id(battery_voltage));
                        it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, detail_line);
                      } else {
                        it->print(64, 45, id(tiny_font), COLOR_ON, display::TextAlign::CENTER, "BATTERY: N/A");
                      }

                      if (show_contrast_feedback) {
                        draw_contrast_footer();
                      } else {
                        draw_default_footer();
                      }
                    }
                    break;
                }
                it->display();
                id(updated_ui) = false;

  - id: reset_idle_timer
    mode: restart
    then:
      - lambda: |-
          id(last_active) = millis() / 1000;

interval:
  - interval: 500ms
    then:
      - if:
          condition:
            lambda: 'return (millis() / 1000) - id(last_active) >= ${SLEEP_DURATION};'
          then:
            - script.execute: turn_off
          else:
            - lambda: |-
                uint32_t now = millis();
                uint32_t elapsed = now - id(last_brightness_interaction);
                if (elapsed > 3000 && elapsed < 3500) {
                  id(updated_ui) = true;
                }
                uint32_t switch_elapsed = now - id(last_switch_interaction);
                if (id(last_switch_interaction) > 0 && switch_elapsed > 5000 && switch_elapsed < 5500) {
                  id(updated_ui) = true;
                }
                uint32_t fan_speed_elapsed = now - id(last_fan_speed_interaction);
                if (id(last_fan_speed_interaction) > 0 && fan_speed_elapsed > 3000 && fan_speed_elapsed < 3500) {
                  id(updated_ui) = true;
                }
                uint32_t humidifier_elapsed = now - id(last_humidifier_interaction);
                if (id(last_humidifier_interaction) > 0 && humidifier_elapsed > 5000 && humidifier_elapsed < 5500) {
                  id(updated_ui) = true;
                }
                uint32_t humidifier_mode_elapsed = now - id(last_humidifier_mode_interaction);
                if (id(last_humidifier_mode_interaction) > 0 && humidifier_mode_elapsed > 5000 &&
                    humidifier_mode_elapsed < 5500) {
                  id(updated_ui) = true;
                }
                uint32_t climate_elapsed = now - id(last_climate_interaction);
                if (id(last_climate_interaction) > 0 && climate_elapsed > 3000 && climate_elapsed < 3500) {
                  id(updated_ui) = true;
                }
                uint32_t lock_elapsed = now - id(last_lock_interaction);
                if (id(last_lock_interaction) > 0 && lock_elapsed > 5000 && lock_elapsed < 5500) {
                  id(updated_ui) = true;
                }
                uint32_t cover_elapsed = now - id(last_cover_interaction);
                if (id(last_cover_interaction) > 0 && cover_elapsed > 5000 && cover_elapsed < 5500) {
                  id(updated_ui) = true;
                }
                uint32_t cover_position_elapsed = now - id(last_cover_position_interaction);
                if (id(last_cover_position_interaction) > 0 && cover_position_elapsed > 3000 &&
                    cover_position_elapsed < 3500) {
                  id(updated_ui) = true;
                }
                uint32_t climate_target_focus_elapsed = now - id(last_climate_target_focus_interaction);
                if (id(last_climate_target_focus_interaction) > 0 && climate_target_focus_elapsed > 5000 &&
                    climate_target_focus_elapsed < 5500) {
                  id(climate_target_focus) = 0;
                  id(climate_target_focus_value) = NAN;
                  id(last_climate_target_focus_interaction) = 0;
                  id(updated_ui) = true;
                }
                uint32_t media_elapsed = now - id(last_media_volume_interaction);
                if (id(last_media_volume_interaction) > 0 && media_elapsed > 3000 && media_elapsed < 3500) {
                  id(updated_ui) = true;
                }
                uint32_t media_source_elapsed = now - id(last_media_source_interaction);
                if (id(last_media_source_interaction) > 0 && media_source_elapsed > 5000 &&
                    media_source_elapsed < 5500) {
                  id(updated_ui) = true;
                }
                uint32_t media_power_elapsed = now - id(last_media_power_interaction);
                if (id(last_media_power_interaction) > 0 && media_power_elapsed > 5000 &&
                    media_power_elapsed < 5500) {
                  id(updated_ui) = true;
                }
                uint32_t automation_elapsed = now - id(last_automation_interaction);
                if (id(last_automation_interaction) > 0 && automation_elapsed > 5000 && automation_elapsed < 5500) {
                  id(updated_ui) = true;
                }
                uint32_t contrast_elapsed = now - id(last_contrast_interaction);
                if (id(last_contrast_interaction) > 0 && contrast_elapsed > 3000 && contrast_elapsed < 3500) {
                  id(updated_ui) = true;
                }
            - if:
                condition:
                  wifi.connected:
                then:
                  - if:
                      condition:
                        api.connected:
                          state_subscription_only: true
                      then:
                        - if:
                            condition:
                              lambda: 'return id(show_boot_screen) && !id(low_battery_popup_active);'
                            then:
                              - if:
                                  condition:
                                    lambda: 'return id(battery_monitoring_available) && !id(low_battery_popup_shown) && !isnan(id(battery_voltage)) && id(battery_voltage) <= ${LOW_BATTERY_VOLTAGE};'
                                  then:
                                    - script.execute: show_low_battery_popup
                                  else:
                                    - lambda: |-
                                        id(show_boot_screen) = false;
                                        id(updated_ui) = true;
            - if:
                condition:
                  lambda: 'return id(low_battery_popup_active);'
                then:
                  - lambda: 'return;'
                else:
                  - if:
                      condition:
                        lambda: 'return id(show_boot_screen);'
                      then:
                        - script.execute: boot_screen
                      else:
                        - if:
                            condition:
                              not:
                                wifi.connected:
                            then:
                              - script.execute: wifi_disconnected_screen
                            else:
                              - if:
                                  condition:
                                    not:
                                      api.connected:
                                        state_subscription_only: true
                                  then:
                                    - script.execute: api_disconnected_screen
                                  else:
                                    - script.execute: sync_current_mode_status
                                    - script.execute: update_display
  - interval: 30min
    then:
      - lambda: |-
          request_all_weather_status();
