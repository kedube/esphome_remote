          bool long_press_fired = id(primary_button_long_press_fired);
          id(primary_button_press_started_at) = 0;
          id(primary_button_press_mode) = -1;
          id(primary_button_long_press_fired) = false;

          if (!long_press_fired) {
            id(updated_ui) = true;
