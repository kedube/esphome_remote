          int &selected_index = selected_index_ref(
              mode, id(selected_light_index), id(selected_switch_index), id(selected_climate_index), id(selected_lock_index), id(selected_cover_index),
              id(selected_media_index), id(selected_automation_index), id(selected_weather_index), id(selected_time_index), id(selected_fan_index),
              id(selected_humidifier_index));
          selected_index = wrapped_mode_index(selected_index, count, step);
      - script.execute: update_selected_item

  - id: select_next_item
