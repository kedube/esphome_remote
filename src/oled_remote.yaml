  - id: verify_selected_lock_result
    mode: restart
    parameters:
      expected_state: std::string
      success_feedback: std::string
    then:
      - lambda: |-
          id(lock_verification_complete) = false;
      - repeat:
          count: 5
          then:
            - if:
                condition:
                  lambda: 'return !id(lock_verification_complete);'
                then:
                  - lambda: |-
                      request_selected_lock_status(id(selected_lock_index));
                  - delay: 1000ms
                  - lambda: |-
                      const std::string state = selected_lock_state(id(selected_lock_index));
                      if (state == expected_state) {
                        id(set_lock_feedback).execute(success_feedback);
                        id(lock_verification_complete) = true;
                      } else if (state == "jammed") {
                        id(set_lock_feedback).execute("JAMMED");
                        id(lock_verification_complete) = true;
                      } else if (state == "locking") {
                        id(set_lock_feedback).execute("LOCKING...");
                      } else if (state == "unlocking") {
                        id(set_lock_feedback).execute("UNLOCKING...");
                      }
      - if:
          condition:
            lambda: 'return !id(lock_verification_complete);'
          then:
            - lambda: |-
                request_selected_lock_status(id(selected_lock_index));
            - delay: 500ms
            - lambda: |-
                const std::string state = selected_lock_state(id(selected_lock_index));
                if (state == expected_state) {
                  id(set_lock_feedback).execute(success_feedback);
                } else if (state == "jammed") {
                  id(set_lock_feedback).execute("JAMMED");
                }
                id(lock_verification_complete) = true;

