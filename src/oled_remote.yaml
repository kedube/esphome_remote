            id(last_automation_feedback) = "RUNNING...";
          } else if (kind == AUTOMATION_KIND_SCENE) {
            id(last_automation_feedback) = "ACTIVATING...";
          } else {
            id(last_automation_feedback) = "TRIGGERING...";
          }
          id(last_automation_interaction) = millis();
          id(updated_ui) = true;
      - script.execute: update_display
